name: Deploy API to Elastic Beanstalk

on:
  push:
    branches:
      - staging
      - main
      - sandbox
    paths:
      - "api/**"
      - ".github/workflows/api-deploy.yml"
      - ".github/actions/install-hurl/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without API changes"
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows: ["Auto Merge Staging to Main if All Reviewers Approved"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.extract_branch.outputs.branch_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Log event context
        run: |
          echo "Event name: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggered by workflow_run."
            echo "workflow_run head_branch: ${{ github.event.workflow_run.head_branch }}"
          else
            echo "Triggered by push or other event."
            echo "github.ref_name: ${{ github.ref_name }}"
          fi

      - name: Extract branch name
        id: extract_branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "BRANCH_NAME=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
            echo "branch_name=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
            echo "Extracted branch name from workflow_run: ${{ github.event.workflow_run.head_branch }}"
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "branch_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Extracted branch name from ref_name: ${{ github.ref_name }}"
          fi

      - name: Set environment variables
        run: |
          echo "Setting environment variables for branch: $BRANCH_NAME"
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.PROD_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=production" >> $GITHUB_ENV
            echo "Set production environment variables."
          elif [ "$BRANCH_NAME" = "staging" ]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.STAGING_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=staging" >> $GITHUB_ENV
            echo "Set staging environment variables."
          elif [ "$BRANCH_NAME" = "sandbox" ]; then
            echo "ENVIRONMENT=sandbox" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.SANDBOX_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=sandbox" >> $GITHUB_ENV
            echo "Set sandbox environment variables."
          else
            echo "Branch '$BRANCH_NAME' is not configured for deployment. Skipping deployment."
            echo "SKIP_DEPLOYMENT=true" >> $GITHUB_ENV
          fi

      - name: Install uv
        if: env.SKIP_DEPLOYMENT != 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: set up python
        if: env.SKIP_DEPLOYMENT != 'true'
        run: uv python install
        working-directory: api

      - name: Generate requirements.txt
        if: env.SKIP_DEPLOYMENT != 'true'
        run: uv export --frozen --no-emit-workspace --no-dev --no-editable -o requirements.txt --no-hashes
        working-directory: api

      - name: Generate deployment package
        if: env.SKIP_DEPLOYMENT != 'true'
        run: |
          cd api
          zip -r ../deploy.zip ./ -x "*.git*"

      - name: echo
        run: |
          echo "${{ env.VERSION_PREFIX }}-${{ github.sha }}-${{ github.run_number }}"
          echo ${{ secrets.AWS_S3_REGION }}

      - name: Deploy to Elastic Beanstalk
        if: env.SKIP_DEPLOYMENT != 'true'
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ env.ENV_NAME }}
          version_label: "${{ env.VERSION_PREFIX }}-${{ github.sha }}-${{ github.run_number }}"
          region: ${{ secrets.AWS_S3_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true

      - name: Skip deployment
        if: env.SKIP_DEPLOYMENT == 'true'
        run: echo "Deployment skipped for branch '${{ env.BRANCH_NAME }}'"

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables for smoke testing
        run: |
          echo "BRANCH_NAME=${{ needs.deploy.outputs.branch_name }}" >> $GITHUB_ENV
          if [ "${{ needs.deploy.outputs.branch_name }}" = "main" ]; then
            echo "BASE_URL=${{ secrets.PROD_BASE_URL }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.PROD_API_KEY }}" >> $GITHUB_ENV
          elif [ "${{ needs.deploy.outputs.branch_name }}" = "staging" ]; then
            echo "BASE_URL=${{ secrets.STAGING_BASE_URL }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.STAGING_API_KEY }}" >> $GITHUB_ENV
          elif [ "${{ needs.deploy.outputs.branch_name }}" = "sandbox" ]; then
            echo "BASE_URL=${{ secrets.SANDBOX_BASE_URL }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.STAGING_API_KEY }}" >> $GITHUB_ENV
          else
            echo "No smoke test configuration for branch '${{ needs.deploy.outputs.branch_name }}'"
            exit 1
          fi

      - name: Install Hurl
        uses: ./.github/actions/install-hurl

      - name: Run smoke tests
        run: hurl --location --variable baseURL=${{ env.BASE_URL }} --variable apiKey=${{ env.API_KEY }} --test ./_smoke_testing/hurl/get/*
        working-directory: api
