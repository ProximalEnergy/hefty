name: Sync Types and Check TypeScript

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "core/**"
      - ".github/workflows/sync-types-and-check.yml"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # For OIDC authentication if needed
  contents: read

jobs:
  sync-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for git diff

      - name: Check for changes in api/ or core/
        id: check-changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "${BASE_SHA}"...HEAD | \
            grep -E '^(api/|core/)' > /dev/null; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected in api/ or core/"
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected in api/ or core/"
          fi

      - name: Set up Python with uv
        if: steps.check-changes.outputs.changes_detected == 'true'
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: Install core dependencies
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: uv sync
        working-directory: core

      - name: Install API dependencies
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: uv sync --locked
        working-directory: api

      - name: Set up Node.js
        if: steps.check-changes.outputs.changes_detected == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install web-app dependencies
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: npm ci
        working-directory: web-app

      - name: Run sync script
        if: steps.check-changes.outputs.changes_detected == 'true'
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          DISABLE_PARAMETER_STORE_BOOTSTRAP: "1"
          ENVIRONMENT: "development"
        run: bash _scripts/sync_api_and_ts_types_and_enums.sh

      - name: Check if generated files changed
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          if git diff --exit-code web-app/src/api/enumerations.ts web-app/src/api/schema.d.ts > /dev/null; then
            echo "✓ Generated files are up to date"
          else
            echo "::error::Generated files (enumerations.ts or schema.d.ts) changed after running sync script."
            echo "::error::This means backend changes require frontend type updates."
            echo "::error::👀 Please run 'mise run codegen' locally and commit the changes. 👀"
            echo ""
            echo "Diff:"
            git diff web-app/src/api/enumerations.ts web-app/src/api/schema.d.ts
            exit 1
          fi
