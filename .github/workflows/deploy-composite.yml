name: Composite Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main
      - sandbox
      - demo
    paths:
      - "core/src/core/**"
      - "core/pyproject.toml"
      - "api/**"
      - "pyproject.toml"
      - "_scripts/pyproject_dependencies_changed.py"
      - "_scripts/prepare_core_publish_artifact.py"
      - "uv.lock"
      - "web-app/**"
      - ".github/workflows/deploy-composite.yml"
      - ".github/actions/setup-uv-python-from-pyproject/**"
      - "amplify.yml"
  workflow_run:
    workflows: ["Auto Merge Staging to Main if All Reviewers Approved"]
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  # Job 0: Detect what changed
  detect-changes:
    runs-on: ubuntu-latest
    # Only run if triggered by push, workflow_dispatch (on staging/main/sandbox), or if workflow_run completed successfully
    # Note: workflow_run works even when triggered by automated actions (schedule/workflow_dispatch)
    # because those are not considered "workflow-triggered" events that would be blocked
    # For workflow_run: ensure it completed successfully and ran on main branch
    # We use head_branch check instead of branches filter because scheduled workflows
    # can have issues with branch filters, but head_branch is reliably set to 'main'
    # for scheduled workflows that run on the default branch
    # For workflow_dispatch: only allow staging, main, or sandbox branches
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.ref_name == 'staging' || github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'demo')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      core: ${{ github.event_name == 'workflow_dispatch' && steps.override.outputs.core || steps.core-change.outputs.core }}
      api: ${{ github.event_name == 'workflow_dispatch' && steps.override.outputs.api || steps.filter.outputs.api }}
      web-app: ${{ github.event_name == 'workflow_dispatch' && steps.override.outputs.web-app || steps.filter.outputs.web-app }}
    steps:
      - name: Debug workflow trigger information
        run: |
          echo "=== Workflow Trigger Debug ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggered by workflow_run event"
            echo "Triggering workflow: ${{ github.event.workflow_run.name }}"
            echo "Triggering workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
            echo "Triggering workflow head branch: ${{ github.event.workflow_run.head_branch }}"
            echo "Triggering workflow head SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "Triggering workflow event: ${{ github.event.workflow_run.event }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Triggered by manual workflow_dispatch"
            echo "Branch: ${{ github.ref_name }}"
            echo "SHA: ${{ github.sha }}"
          fi
          echo "=============================="

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
          fetch-depth: ${{ (github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch') && 2 || 1 }}

      - name: Determine base commit for comparison
        id: base-commit
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # For workflow_run, use HEAD^ (parent of merge commit on main)
            # Get the actual SHA of the parent commit
            BASE_COMMIT=$(git rev-parse HEAD^)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For workflow_dispatch, use HEAD^ (previous commit on the branch)
            # This allows detecting changes since the last commit
            BASE_COMMIT=$(git rev-parse HEAD^)
          else
            # For push events, use the before commit
            BASE_COMMIT="${{ github.event.before }}"
          fi
          echo "base=$BASE_COMMIT" >> $GITHUB_OUTPUT
          echo "Using base commit: $BASE_COMMIT"

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ steps.base-commit.outputs.base }}
          filters: |
            core:
              - 'core/src/core/**'
              - 'core/pyproject.toml'
            api:
              - 'api/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web-app:
              - 'web-app/**'
              - 'amplify.yml'

      - name: Detect root dependency changes for core release
        id: root-core-deps
        run: |
          ROOT_CORE_DEPS_CHANGED="$(
            python3 _scripts/pyproject_dependencies_changed.py \
              --base "${{ steps.base-commit.outputs.base }}" \
              --head HEAD \
              --path pyproject.toml
          )"
          echo "changed=$ROOT_CORE_DEPS_CHANGED" >> $GITHUB_OUTPUT
          echo "Root dependency changes affecting core: $ROOT_CORE_DEPS_CHANGED"

      - name: Finalize core change detection
        id: core-change
        run: |
          CORE_FILTER_CHANGED="${{ steps.filter.outputs.core }}"
          ROOT_CORE_DEPS_CHANGED="${{ steps.root-core-deps.outputs.changed }}"

          if [ "$CORE_FILTER_CHANGED" = "true" ] || \
             [ "$ROOT_CORE_DEPS_CHANGED" = "true" ]; then
            echo "core=true" >> $GITHUB_OUTPUT
          else
            echo "core=false" >> $GITHUB_OUTPUT
          fi

      - name: Override change detection for manual triggers
        id: override
        if: github.event_name == 'workflow_dispatch'
        run: |
          # For manual triggers, always detect changes to ensure deployment happens
          echo "Manual trigger detected - forcing change detection for all components"
          echo "core=true" >> $GITHUB_OUTPUT
          echo "api=true" >> $GITHUB_OUTPUT
          echo "web-app=true" >> $GITHUB_OUTPUT

      - name: Echo detected changes
        run: |
          echo "Changes detected:"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Core: ${{ steps.override.outputs.core }} (manual trigger - forced)"
            echo "  API: ${{ steps.override.outputs.api }} (manual trigger - forced)"
            echo "  Web-App: ${{ steps.override.outputs.web-app }} (manual trigger - forced)"
          else
            echo "  Core: ${{ steps.core-change.outputs.core }}"
            echo "  Root dependency changes: ${{ steps.root-core-deps.outputs.changed }}"
            echo "  API: ${{ steps.filter.outputs.api }}"
            echo "  Web-App: ${{ steps.filter.outputs.web-app }}"
          fi

  # Job 1: Publish Core Package
  publish-core:
    needs: detect-changes
    runs-on: ubuntu-latest
    # Only run if core files changed
    if: |
      needs.detect-changes.outputs.core == 'true' &&
      (github.ref_name == 'dev' || github.ref_name == 'staging' || github.ref_name == 'main' || github.ref_name == 'demo')
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release type and version
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          BASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('core/pyproject.toml', 'rb'))['project']['version'])")
          echo "Current version: $BASE_VERSION"

          BASE_VERSION=$(echo $BASE_VERSION | sed -E 's/(a|b|rc)[0-9]+$//')
          echo "Base version: $BASE_VERSION"

          if [ "$BRANCH" = "dev" ]; then
            RELEASE_TYPE="beta"
            VERSION_SUFFIX="b"
            PRERELEASE="true"

            EXISTING_BETAS=$(git tag -l "core-v${BASE_VERSION}b*" | sed -E "s/.*b([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_BETAS" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((EXISTING_BETAS + 1))
            fi
            VERSION="${BASE_VERSION}b${BETA_NUM}"

          elif [ "$BRANCH" = "staging" ]; then
            RELEASE_TYPE="rc"
            VERSION_SUFFIX="rc"
            PRERELEASE="true"

            EXISTING_RCS=$(git tag -l "core-v${BASE_VERSION}rc*" | sed -E "s/.*rc([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_RCS" ]; then
              RC_NUM=1
            else
              RC_NUM=$((EXISTING_RCS + 1))
            fi
            VERSION="${BASE_VERSION}rc${RC_NUM}"

          elif [ "$BRANCH" = "demo" ]; then
            RELEASE_TYPE="alpha"
            VERSION_SUFFIX="a"
            PRERELEASE="true"

            EXISTING_ALPHAS=$(git tag -l "core-v${BASE_VERSION}a*" | sed -E "s/.*a([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_ALPHAS" ]; then
              ALPHA_NUM=1
            else
              ALPHA_NUM=$((EXISTING_ALPHAS + 1))
            fi
            VERSION="${BASE_VERSION}a${ALPHA_NUM}"

          elif [ "$BRANCH" = "main" ]; then
            RELEASE_TYPE="stable"
            VERSION_SUFFIX="stable"
            PRERELEASE="false"
            VERSION="$BASE_VERSION"

          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=Core v${VERSION}" >> $GITHUB_OUTPUT
          echo "Final version: $VERSION"

      - name: Prepare temp core publish artifact
        id: prepare-core
        run: |
          BUILD_ROOT="$(mktemp -d)"
          BUILD_DIR="$BUILD_ROOT/core"
          cp -R core "$BUILD_DIR"

          python3 _scripts/prepare_core_publish_artifact.py inject \
            --root-pyproject pyproject.toml \
            --core-pyproject core/pyproject.toml \
            --build-pyproject "$BUILD_DIR/pyproject.toml" \
            --version "${{ steps.version.outputs.version }}"

          echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "Prepared temp publish artifact in $BUILD_DIR"
          grep "version =" "$BUILD_DIR/pyproject.toml"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token --domain proximal-code-artifact-domain --region us-east-2 --query authorizationToken --output text)
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "AWS_CODEARTIFACT_TOKEN=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Set UV environment variables
        run: |
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV
          echo "UV_PUBLISH_URL=https://proximal-code-artifact-domain-016997484973.d.codeartifact.us-east-2.amazonaws.com/pypi/proximal-hub/" >> $GITHUB_ENV
          echo "UV_PUBLISH_CHECK_URL=https://proximal-code-artifact-domain-016997484973.d.codeartifact.us-east-2.amazonaws.com/pypi/proximal-hub/simple/" >> $GITHUB_ENV
          echo "UV_PUBLISH_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_PUBLISH_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Build Wheel
        run: uv build --out-dir dist
        working-directory: ${{ steps.prepare-core.outputs.build_dir }}

      - name: Verify built wheel metadata
        run: |
          shopt -s nullglob
          wheels=("${{ steps.prepare-core.outputs.build_dir }}"/dist/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one built wheel, found ${#wheels[@]}"
            exit 1
          fi

          python3 _scripts/prepare_core_publish_artifact.py verify-wheel \
            --root-pyproject pyproject.toml \
            --core-pyproject core/pyproject.toml \
            --wheel "${wheels[0]}"

      - name: Publish to AWS CodeArtifact
        run: |
          uv publish \
            --publish-url "$UV_PUBLISH_URL" \
            --check-url "$UV_PUBLISH_CHECK_URL" \
            dist/*
        working-directory: ${{ steps.prepare-core.outputs.build_dir }}

  # Job 2: Create GitHub Release (depends on publish-core)
  create-release:
    needs: publish-core
    runs-on: ubuntu-latest
    if: needs.publish-core.result == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.publish-core.outputs.version }}"
          RELEASE_NAME="${{ needs.publish-core.outputs.release_name }}"
          PRERELEASE="${{ needs.publish-core.outputs.prerelease }}"

          if [ "$PRERELEASE" = "true" ]; then
            gh release create core-v${VERSION} --generate-notes --title "$RELEASE_NAME" --prerelease
          else
            gh release create core-v${VERSION} --generate-notes --title "$RELEASE_NAME"
          fi

  # Job 3: Deploy API (bundles workspace core)
  deploy-api:
    needs: [detect-changes, publish-core]
    runs-on: ubuntu-latest
    # Deploy API when API or bundled core inputs change
    if: |
      !cancelled() &&
      (
        needs.publish-core.result == 'success' ||
        needs.publish-core.result == 'skipped'
      ) &&
      (
        needs.detect-changes.outputs.api == 'true' ||
        needs.detect-changes.outputs.core == 'true'
      ) &&
      (github.ref_name == 'staging' || github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'demo')
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Set environment variables
        id: set-env
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Setting environment variables for branch: $BRANCH"

          if [ "$BRANCH" = "main" ]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.PROD_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=production" >> $GITHUB_ENV
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.STAGING_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=staging" >> $GITHUB_ENV
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "sandbox" ]; then
            echo "ENVIRONMENT=sandbox" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.SANDBOX_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=sandbox" >> $GITHUB_ENV
            echo "environment=sandbox" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "demo" ]; then
            echo "ENVIRONMENT=demo" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.DEMO_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=demo" >> $GITHUB_ENV
            echo "environment=demo" >> $GITHUB_OUTPUT
          fi

      - name: Determine bundled core version
        id: core-version
        run: |
          VERSION="${{ needs.publish-core.outputs.version }}"

          if [ -z "$VERSION" ]; then
            VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("core/pyproject.toml", "rb"))["project"]["version"])')"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bundled core version: $VERSION"

      - name: Install uv and set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "false"
          working-directory: .

      - name: Generate requirements.txt without workspace packages
        run: |
          uv export --project . --package api --frozen --no-dev \
            --no-emit-package api --no-emit-package core \
            -o api/requirements.txt --no-hashes

          echo "Generated requirements.txt for bundled workspace deployment"
          echo ""
          echo "Checking that workspace packages are omitted from requirements.txt:"
          if grep -E -q \
            '^(api|core)([<=>!~ ]|$)' \
            api/requirements.txt; then
            echo "ERROR: requirements.txt still contains workspace packages"
            exit 1
          fi
          echo "Workspace packages are omitted"
          echo ""
          echo "Checking for local path requirements:"
          if grep -E -q \
            '(^(\.\.?/|/)|@ file:|^-[eE] )' \
            api/requirements.txt; then
            echo "ERROR: requirements.txt contains local path or editable refs"
            exit 1
          fi
          echo "No local path or editable refs found"
          echo ""
          echo "Total dependencies:"
          wc -l api/requirements.txt

      - name: Bundle workspace core into API package
        run: |
          rm -rf api/core
          find api -maxdepth 1 -type d -name 'core-*.dist-info' \
            -exec rm -rf {} +
          mkdir -p api/core
          cp -R core/src/core/. api/core/

          BUILD_ROOT="$(mktemp -d)"
          BUILD_DIR="$BUILD_ROOT/core"
          CORE_WHEEL_DIR="$(mktemp -d)"
          trap 'rm -rf "$BUILD_ROOT" "$CORE_WHEEL_DIR"' EXIT

          cp -R core "$BUILD_DIR"

          python3 _scripts/prepare_core_publish_artifact.py inject \
            --root-pyproject pyproject.toml \
            --core-pyproject core/pyproject.toml \
            --build-pyproject "$BUILD_DIR/pyproject.toml" \
            --version "${{ steps.core-version.outputs.version }}"

          (
            cd "$BUILD_DIR"
            uv build --wheel --out-dir "$CORE_WHEEL_DIR"
          )

          CORE_WHEEL_PATH="$(
            find "$CORE_WHEEL_DIR" -maxdepth 1 -name 'core-*.whl' \
              | head -n 1
          )"
          test -n "$CORE_WHEEL_PATH"

          unzip -q "$CORE_WHEEL_PATH" 'core-*.dist-info/*' -d api

          CORE_DIST_INFO_DIR="$(
            find api -maxdepth 1 -type d -name 'core-*.dist-info' \
              | head -n 1
          )"
          test -n "$CORE_DIST_INFO_DIR"
          test -f "$CORE_DIST_INFO_DIR/METADATA"

          METADATA_VERSION="$(
            grep '^Version: ' "$CORE_DIST_INFO_DIR/METADATA" \
              | sed 's/^Version: //'
          )"
          test "$METADATA_VERSION" = \
            "${{ steps.core-version.outputs.version }}"

          echo "Bundled core files:"
          test -f api/core/__init__.py
          test -f api/core/models.py
          find api/core -maxdepth 1 -type f | sort | sed -n '1,20p'
          echo ""
          echo "Bundled core distribution metadata:"
          echo "$CORE_DIST_INFO_DIR"
          ls "$CORE_DIST_INFO_DIR" | sort | sed -n '1,20p'

      - name: Generate deployment package
        run: |
          cd api
          CORE_DIST_INFO_DIR="$(
            find . -maxdepth 1 -type d -name 'core-*.dist-info' \
              | head -n 1
          )"

          test -f requirements.txt
          test -d app
          test -d core
          test -f core/__init__.py
          test -n "$CORE_DIST_INFO_DIR"
          test -f "$CORE_DIST_INFO_DIR/METADATA"
          test -f Procfile
          test -d .platform

          BUNDLED_CORE_VERSION="$(
            python -c \
              "import importlib.metadata as metadata; \
              print(metadata.version('core'))"
          )"
          echo "Bundled core version: $BUNDLED_CORE_VERSION"
          test "$BUNDLED_CORE_VERSION" = \
            "${{ steps.core-version.outputs.version }}"

          echo "Files to be included in deployment:"
          echo "- requirements.txt: $(test -f requirements.txt && echo 'EXISTS' || echo 'MISSING')"
          echo "- app directory: $(test -d app && echo 'EXISTS' || echo 'MISSING')"
          echo "- Procfile: $(test -f Procfile && echo 'EXISTS' || echo 'MISSING')"
          echo "- core dist-info: $(test -n "$CORE_DIST_INFO_DIR" && echo 'EXISTS' || echo 'MISSING')"
          echo "- .platform hooks: $(test -d .platform && echo 'EXISTS' || echo 'MISSING')"
          echo ""

          zip -r ../deploy.zip . -x "*.git*"
          echo ""
          echo "Deployment package created"
          cd ..
          echo ""
          echo "Verifying critical files in package:"
          echo "=== requirements.txt ==="
          unzip -l deploy.zip | grep "requirements.txt"
          echo ""
          echo "=== Bundled core ==="
          unzip -l deploy.zip | grep "core/__init__.py"
          echo ""
          echo "=== Bundled core metadata ==="
          unzip -l deploy.zip | grep -E "core-.*dist-info/METADATA"
          echo ""
          echo "=== Procfile ==="
          unzip -l deploy.zip | grep "Procfile"
          echo ""
          echo "=== Package size ==="
          ls -lh deploy.zip

      - name: Configure AWS credentials for Elastic Beanstalk
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_EB }}
          aws-region: us-east-2

      - name: Get temporary AWS credentials
        id: aws-creds
        run: |
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_OUTPUT
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ steps.aws-creds.outputs.AWS_SESSION_TOKEN }}
          application_name: api
          environment_name: ${{ env.ENV_NAME }}
          version_label: "${{ env.VERSION_PREFIX }}-${{ github.sha }}-${{ github.run_number }}"
          region: ${{ secrets.AWS_S3_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true

  # Job 4: Deploy Web-App (depends on deploy-api - ATOMIC)
  deploy-web-app:
    needs: [publish-core, deploy-api, detect-changes]
    runs-on: ubuntu-latest
    # Only deploy web-app if API deploy succeeded and branch is staging/main/sandbox
    if: |
      !cancelled() &&
      (github.ref_name == 'staging' || github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'demo') &&
      needs.publish-core.result != 'failure' &&
      (needs.deploy-api.result == 'success' || (needs.deploy-api.result == 'skipped' && needs.detect-changes.outputs.web-app == 'true'))

    steps:
      - uses: actions/checkout@v6

      - name: Trigger Amplify Build
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Triggering Amplify build for branch: $BRANCH"

          if [ "$BRANCH" = "main" ]; then
            WEBHOOK_URL="${{ secrets.AMPLIFY_WEBHOOK_URL_MAIN }}"
          elif [ "$BRANCH" = "staging" ]; then
            WEBHOOK_URL="${{ secrets.AMPLIFY_WEBHOOK_URL_STAGING }}"
          elif [ "$BRANCH" = "sandbox" ]; then
            WEBHOOK_URL="${{ secrets.AMPLIFY_WEBHOOK_URL_SANDBOX }}"
          elif [ "$BRANCH" = "demo" ]; then
            WEBHOOK_URL="${{ secrets.AMPLIFY_WEBHOOK_URL_DEMO }}"
          else
            echo "No Amplify webhook configured for branch '$BRANCH'"
            exit 1
          fi

          curl -X POST -d {} "$WEBHOOK_URL" -H "Content-Type:application/json"
          echo ""
          echo "Amplify build triggered successfully for $BRANCH"

  # # Job 5: Smoke Test (depends on deploy-api - ATOMIC)
  # smoke-test:
  #   needs: [publish-core, deploy-api]
  #   runs-on: ubuntu-latest
  #   # Only run smoke tests if API deploy succeeded
  #   if: needs.deploy-api.result == 'success'

  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set environment variables for smoke testing
  #       run: |
  #         BRANCH="${{ github.ref_name }}"
  #         echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

  #         if [ "$BRANCH" = "main" ]; then
  #           echo "BASE_URL=${{ secrets.PROD_BASE_URL }}" >> $GITHUB_ENV
  #           echo "API_KEY=${{ secrets.PROD_API_KEY }}" >> $GITHUB_ENV
  #         elif [ "$BRANCH" = "staging" ]; then
  #           echo "BASE_URL=${{ secrets.STAGING_BASE_URL }}" >> $GITHUB_ENV
