name: Composite Deploy - Core & API

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "core/src/core/**"
      - "core/pyproject.toml"
      - "api/**"
      - ".github/workflows/deploy-composite.yml"

permissions:
  id-token: write
  contents: write

jobs:
  # Job 0: Detect what changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/src/core/**'
              - 'core/pyproject.toml'
            api:
              - 'api/**'

      - name: Echo detected changes
        run: |
          echo "Changes detected:"
          echo "  Core: ${{ steps.filter.outputs.core }}"
          echo "  API: ${{ steps.filter.outputs.api }}"

  # Job 1: Publish Core Package
  publish-core:
    needs: detect-changes
    runs-on: ubuntu-latest
    # Only run if core files changed
    if: needs.detect-changes.outputs.core == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type and version
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          BASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('core/pyproject.toml', 'rb'))['project']['version'])")
          echo "Current version: $BASE_VERSION"

          BASE_VERSION=$(echo $BASE_VERSION | sed -E 's/(a|b|rc)[0-9]+$//')
          echo "Base version: $BASE_VERSION"

          if [ "$BRANCH" = "dev" ]; then
            RELEASE_TYPE="beta"
            VERSION_SUFFIX="b"
            PRERELEASE="true"

            EXISTING_BETAS=$(git tag -l "core-v${BASE_VERSION}b*" | sed -E "s/.*b([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_BETAS" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((EXISTING_BETAS + 1))
            fi
            VERSION="${BASE_VERSION}b${BETA_NUM}"

          elif [ "$BRANCH" = "staging" ]; then
            RELEASE_TYPE="rc"
            VERSION_SUFFIX="rc"
            PRERELEASE="true"

            EXISTING_RCS=$(git tag -l "core-v${BASE_VERSION}rc*" | sed -E "s/.*rc([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_RCS" ]; then
              RC_NUM=1
            else
              RC_NUM=$((EXISTING_RCS + 1))
            fi
            VERSION="${BASE_VERSION}rc${RC_NUM}"

          elif [ "$BRANCH" = "main" ]; then
            RELEASE_TYPE="stable"
            VERSION_SUFFIX="stable"
            PRERELEASE="false"
            VERSION="$BASE_VERSION"

          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=Core v${VERSION}" >> $GITHUB_OUTPUT
          echo "Final version: $VERSION"

      - name: Update version in pyproject.toml
        run: |
          python3 -c "
          import re

          with open('core/pyproject.toml', 'r') as f:
              content = f.read()

          content = re.sub(
              r'version = \"[^\"]+\"',
              f'version = \"${{ steps.version.outputs.version }}\"',
              content
          )

          with open('core/pyproject.toml', 'w') as f:
              f.write(content)
          "

          echo "Updated version to ${{ steps.version.outputs.version }}"
          cat core/pyproject.toml | grep "version ="

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token --domain proximal-code-artifact-domain --region us-east-2 --query authorizationToken --output text)
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "AWS_CODEARTIFACT_TOKEN=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Set UV environment variables
        run: |
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV
          echo "UV_PUBLISH_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_PUBLISH_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Wheel
        run: uv build --out-dir dist
        working-directory: core

      - name: Publish to AWS CodeArtifact
        run: uv publish --index proximal-package-index dist/*
        working-directory: core

  # Job 2: Create GitHub Release (depends on publish-core)
  create-release:
    needs: publish-core
    runs-on: ubuntu-latest
    if: needs.publish-core.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.publish-core.outputs.version }}"
          RELEASE_NAME="${{ needs.publish-core.outputs.release_name }}"
          PRERELEASE="${{ needs.publish-core.outputs.prerelease }}"

          if [ "$PRERELEASE" = "true" ]; then
            gh release create core-v${VERSION} --generate-notes --title "$RELEASE_NAME" --prerelease
          else
            gh release create core-v${VERSION} --generate-notes --title "$RELEASE_NAME"
          fi

  # Job 3: Deploy API (depends on publish-core - ATOMIC)
  deploy-api:
    needs: [detect-changes, publish-core]
    runs-on: ubuntu-latest
    # Only deploy API if core publish succeeded OR if only API files changed
    if: |
      !cancelled() &&
      (needs.publish-core.result == 'success' || (needs.publish-core.result == 'skipped' && needs.detect-changes.outputs.api == 'true')) &&
      (github.ref_name == 'staging' || github.ref_name == 'main' || github.ref_name == 'sandbox')
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: set-env
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Setting environment variables for branch: $BRANCH"

          if [ "$BRANCH" = "main" ]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.PROD_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=production" >> $GITHUB_ENV
            echo "CORE_VERSION_CONSTRAINT=stable" >> $GITHUB_ENV
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.STAGING_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=staging" >> $GITHUB_ENV
            echo "CORE_VERSION_CONSTRAINT=rc" >> $GITHUB_ENV
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "sandbox" ]; then
            echo "ENVIRONMENT=sandbox" >> $GITHUB_ENV
            echo "ENV_NAME=${{ vars.SANDBOX_ELASTIC_BEANSTALK_ENV_NAME }}" >> $GITHUB_ENV
            echo "VERSION_PREFIX=sandbox" >> $GITHUB_ENV
            echo "CORE_VERSION_CONSTRAINT=rc" >> $GITHUB_ENV
            echo "environment=sandbox" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token --domain proximal-code-artifact-domain --region us-east-2 --query authorizationToken --output text)
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "AWS_CODEARTIFACT_TOKEN=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up python
        run: uv python install
        working-directory: api

      - name: Set core version constraint in pyproject.toml
        run: |
          echo "Setting core version constraint to: ${{ env.CORE_VERSION_CONSTRAINT }}"

          export UV_INDEX_PROXIMAL_USERNAME=aws
          export UV_INDEX_PROXIMAL_PASSWORD=${{ env.AWS_CODEARTIFACT_TOKEN }}

          python3 << 'EOF'
          import re

          with open('pyproject.toml', 'r') as f:
              content = f.read()

          constraint = "${{ env.CORE_VERSION_CONSTRAINT }}"

          if constraint == "stable":
              version_spec = 'core>=0.2.0,<1.0.0'
          elif constraint == "rc":
              version_spec = 'core>=0.2.0rc0,<1.0.0'
          else:
              version_spec = 'core'

          content = re.sub(
              r'"core[^"]*"',
              f'"{version_spec}"',
              content
          )

          with open('pyproject.toml', 'w') as f:
              f.write(content)

          print(f"Updated core dependency to: {version_spec}")
          EOF

          echo "Updated pyproject.toml:"
          grep -A 2 -B 2 "core" pyproject.toml | head -20
        working-directory: api

      - name: Generate requirements.txt with core from CodeArtifact
        run: |
          export UV_INDEX_PROXIMAL_USERNAME=aws
          export UV_INDEX_PROXIMAL_PASSWORD=${{ env.AWS_CODEARTIFACT_TOKEN }}

          uv lock --upgrade-package core

          uv export --frozen --no-emit-workspace --no-dev --no-editable -o requirements.txt --no-hashes

          echo "Generated requirements.txt with core from CodeArtifact"
          echo ""
          echo "Core dependency in requirements.txt:"
          grep "^core" requirements.txt || echo "WARNING: Core not found in requirements.txt"
          echo ""
          echo "Total dependencies:"
          wc -l requirements.txt
        working-directory: api

      - name: Generate deployment package
        run: |
          cd api
          echo "Files to be included in deployment:"
          echo "- requirements.txt: $(test -f requirements.txt && echo 'EXISTS' || echo 'MISSING')"
          echo "- app directory: $(test -d app && echo 'EXISTS' || echo 'MISSING')"
          echo "- Procfile: $(test -f Procfile && echo 'EXISTS' || echo 'MISSING')"
          echo "- .platform hooks: $(test -d .platform && echo 'EXISTS' || echo 'MISSING')"
          echo ""

          zip -r ../deploy.zip . -x "*.git*"
          echo ""
          echo "Deployment package created"
          cd ..
          echo ""
          echo "Verifying critical files in package:"
          echo "=== requirements.txt ==="
          unzip -l deploy.zip | grep "requirements.txt" || echo "ERROR: requirements.txt not found in package!"
          echo ""
          echo "=== Package size ==="
          ls -lh deploy.zip

      - name: Get temporary AWS credentials
        id: aws-creds
        run: |
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_OUTPUT
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ steps.aws-creds.outputs.AWS_SESSION_TOKEN }}
          application_name: api
          environment_name: ${{ env.ENV_NAME }}
          version_label: "${{ env.VERSION_PREFIX }}-${{ github.sha }}-${{ github.run_number }}"
          region: ${{ secrets.AWS_S3_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true

