name: API Auto PR Dev to Staging

on:
  schedule:
    # This is 12:00 UTC (fixed) - converts to 5:00 AM MST (UTC-7) and 6:00 AM MDT (UTC-6)
    - cron: "0 12 * * 2,4,5" # For MST (UTC-7) - Tuesday, Thursday, Friday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for API changes between dev and staging
        id: check_changes
        run: |
          git fetch origin dev
          git fetch origin staging

          # Check if there are any changes in the api/ directory
          API_CHANGES=$(git diff --name-only origin/staging..origin/dev | grep "^api/" || true)

          if [ -z "$API_CHANGES" ]; then
            echo "No API changes found between dev and staging branches"
            echo "has_api_changes=false" >> $GITHUB_OUTPUT
          else
            echo "API changes found:"
            echo "$API_CHANGES"
            echo "has_api_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request from dev to staging
        if: steps.check_changes.outputs.has_api_changes == 'true'
        run: |
          # Use `set +e` to prevent the script from exiting if the command fails
          set +e

          echo "Creating pull request from 'dev' to 'staging' for API changes..."
          echo `gh --version`

          # Attempt to create PR
          ERROR_OUTPUT=$(gh pr create -B staging -H dev --title '[Automated] Merge API changes from dev into staging' --body 'Created by Github action for API changes. Please review and merge manually.' --reviewer marcus-maro --reviewer hunter-proximal 2>&1)
          EXIT_CODE=$?

          # Now that the exit code has been captured, re-enable exit on error behavior
          set -e

          echo "ERROR_OUTPUT: $ERROR_OUTPUT"
          echo "EXIT_CODE: $EXIT_CODE"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Pull request created successfully."
          else
            if echo "$ERROR_OUTPUT" | grep -q "No commits between"; then
              echo "ℹ️ No commits between branches. No pull request needed."
              exit 0
            else
              echo "❌ Unexpected error occurred."
              exit 1
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip PR creation
        if: steps.check_changes.outputs.has_api_changes == 'false'
        run: echo "No API changes detected. Skipping PR creation."
