name: Web App Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "web-app/**"
      - ".github/workflows/web-app-pr-checks.yml"
      - ".mise.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pnpm_version_sync:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Check pnpm version sync
        run: mise run root:pnpm_version_sync

  deprecation_checker:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: run deprecation checker
        run: ./_pr_checks/deprecator.sh
        working-directory: web-app

  default-query-options-no-explicit-type:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep default-query-options-no-explicit-type check
        run: uvx --from ast-grep-cli ast-grep scan --config _scripts/ast-grep/sgconfig.yml --filter "^default-query-options-no-explicit-type$" web-app/src

  query-time-enum:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep query-time-enum check
        run: ./_scripts/web_query_time_enum_check.sh --all-files

  typescript_checker:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            ~/.cache/node-gyp
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev pkg-config

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: TypeScript Check
        run: mise run web:typecheck

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: tsconfig
          path: web-app/tsconfig.json

  format:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-format-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-format-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run Oxfmt
        run: mise run web:format

  knip_checker:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-knip-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-knip-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run Knip check
        run: mise run web:knip

  oxlint:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-oxlint-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-oxlint-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run oxlint check
        run: mise exec -C web-app -- pnpm run lint:github
