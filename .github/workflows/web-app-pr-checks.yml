name: Web App Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - 'web-app/**'
      - '.github/workflows/web-app-pr-checks.yml'

jobs:
  console_log_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: run console.log statement finder
        run: ./_pr_checks/console_log_check.sh
        working-directory: web-app

  deprecation_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: run deprecation checker
        run: ./_pr_checks/deprecator.sh
        working-directory: web-app

  typescript_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/node-gyp
            web-app/node_modules
          key: >-
            npm-${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-${{
            hashFiles('web-app/package-lock.json', 'web-app/build-plotly-custom.js') }}
          restore-keys: |
            npm-${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-
            npm-${{ runner.os }}-

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev pkg-config

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-app

      - name: Build custom Plotly bundle
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: node build-plotly-custom.js
        working-directory: web-app

      - name: TypeScript Check
        run: npx tsc --noEmit
        working-directory: web-app

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: tsconfig
          path: web-app/tsconfig.json

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24  # Match the other jobs

      - name: Cache dependencies
        id: cache-prettier-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            web-app/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('web-app/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-prettier-deps.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-app

      - name: Run Prettier check
        run: npx prettier --check .
        working-directory: web-app

  knip_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache dependencies
        id: cache-knip-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            web-app/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('web-app/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-knip-deps.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-app

      - name: Run Knip check
        run: npx knip
        working-directory: web-app
