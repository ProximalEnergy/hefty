name: Web App Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - 'web-app/**'
      - '.github/workflows/web-app-pr-checks.yml'

jobs:
  console_log_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: run console.log statement finder
        run: ./_pr_checks/console_log_check.sh
        working-directory: web-app

  deprecation_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: run deprecation checker
        run: ./_pr_checks/deprecator.sh
        working-directory: web-app

  typescript_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Or your preferred Node.js version
      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev pkg-config
      - name: Install dependencies
        run: npm ci # Or yarn install if you use Yarn
        working-directory: web-app
      - name: Build custom Plotly bundle
        run: node build-plotly-custom.js
        working-directory: web-app
      - name: TypeScript Check
        run: npx tsc --noEmit #  `--noEmit`  prevents actual file generation, for type checking only
        working-directory: web-app
      - name: Upload diagnostics (if applicable) # Optional: Upload the tsconfig.json
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsconfig
          path: web-app/tsconfig.json

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci
        working-directory: web-app

      - name: Run Prettier check
        run: npx prettier --check .
        working-directory: web-app
