name: Web App Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "web-app/**"
      - ".github/workflows/web-app-pr-checks.yml"
      - ".mise.toml"


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pnpm_version_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v2
      - name: Check pnpm version sync
        run: mise run root:pnpm_version_sync

  deprecation_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: run deprecation checker
        run: ./_pr_checks/deprecator.sh
        working-directory: web-app

  default-query-options-no-explicit-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep default-query-options-no-explicit-type check
        run: uvx semgrep@1.160 --error --config _scripts/rules/default-query-options-no-explicit-type.yaml

  typescript_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            ~/.cache/node-gyp
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json',
            'web-app/build-plotly-custom.js') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev pkg-config

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Build custom Plotly bundle
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mise run web:plotly

      - name: TypeScript Check
        run: mise run web:typecheck

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: tsconfig
          path: web-app/tsconfig.json

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-prettier-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-prettier-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run Prettier check
        run: mise run web:prettier

  knip_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-knip-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-knip-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run Knip check
        run: mise run web:knip

  oxlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install node pnpm

      - name: Cache dependencies
        id: cache-oxlint-deps
        uses: actions/cache@v5
        with:
          path: |
            web-app/.pnpm-store
            web-app/node_modules
          key: >-
            pnpm-${{ runner.os }}-${{
            hashFiles('.mise.toml', 'web-app/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-oxlint-deps.outputs.cache-hit != 'true'
        run: PNPM_STORE_DIR=.pnpm-store mise run web:install

      - name: Run oxlint check
        run: mise exec -C web-app -- pnpm run lint:github
