name: Publish Core to AWS CodeArtifact

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "core/src/core/**"
      - "core/pyproject.toml"
      - ".github/workflows/core-publish.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from (dev/staging/main)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}

    steps:</parameter>
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for core changes
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual triggers, check if there are changes since the last tag
            LAST_TAG=$(git describe --tags --match "core-v*" --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              echo "No previous core tags found, proceeding with deployment"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              CHANGES=$(git diff --name-only $LAST_TAG HEAD -- core/src/core core/pyproject.toml .github/workflows/core-publish.yml)
              if [ -z "$CHANGES" ]; then
                echo "No changes detected in core since $LAST_TAG"
                echo "has_changes=false" >> $GITHUB_OUTPUT
              else
                echo "Changes detected in core since $LAST_TAG:"
                echo "$CHANGES"
                echo "has_changes=true" >> $GITHUB_OUTPUT
              fi
            fi
          else
            # For push events, the paths filter already ensures we have changes
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine release type and version</parameter>
        id: version
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "Branch: $BRANCH"

          # Read current version from pyproject.toml
          BASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('core/pyproject.toml', 'rb'))['project']['version'])")
          echo "Current version: $BASE_VERSION"

          # Strip any existing pre-release suffix to get base version
          BASE_VERSION=$(echo $BASE_VERSION | sed -E 's/(a|b|rc)[0-9]+$//')
          echo "Base version: $BASE_VERSION"

          if [ "$BRANCH" = "dev" ]; then
            RELEASE_TYPE="beta"
            VERSION_SUFFIX="b"
            PRERELEASE="true"

            # Find the next beta number
            EXISTING_BETAS=$(git tag -l "core-v${BASE_VERSION}b*" | sed -E "s/.*b([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_BETAS" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((EXISTING_BETAS + 1))
            fi
            VERSION="${BASE_VERSION}b${BETA_NUM}"

          elif [ "$BRANCH" = "staging" ]; then
            RELEASE_TYPE="rc"
            VERSION_SUFFIX="rc"
            PRERELEASE="true"

            # Find the next rc number
            EXISTING_RCS=$(git tag -l "core-v${BASE_VERSION}rc*" | sed -E "s/.*rc([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_RCS" ]; then
              RC_NUM=1
            else
              RC_NUM=$((EXISTING_RCS + 1))
            fi
            VERSION="${BASE_VERSION}rc${RC_NUM}"

          elif [ "$BRANCH" = "main" ]; then
            RELEASE_TYPE="stable"
            VERSION_SUFFIX=""
            PRERELEASE="false"
            VERSION="$BASE_VERSION"

          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Final version: $VERSION"

      - name: Update version in pyproject.toml
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |</parameter>
          # Update the version in pyproject.toml
          python3 -c "
          import tomllib
          import re

          with open('core/pyproject.toml', 'r') as f:
              content = f.read()

          # Replace version line
          content = re.sub(
              r'version = \"[^\"]+\"',
              f'version = \"${{ steps.version.outputs.version }}\"',
              content
          )

          with open('core/pyproject.toml', 'w') as f:
              f.write(content)
          "

          echo "Updated version to ${{ steps.version.outputs.version }}"
          cat core/pyproject.toml | grep "version ="

      - name: Configure AWS credentials
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:</parameter>
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |</parameter>
          AWS_CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token \
            --domain proximal-code-artifact-domain \
            --region us-east-2 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "AWS_CODEARTIFACT_TOKEN=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Set UV environment variables
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |</parameter>
          echo "UV_INDEX_PROXIMAL_PRIVATE_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PRIVATE_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV
          echo "UV_PUBLISH_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_PUBLISH_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Install uv
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Build Wheel
        if: steps.check_changes.outputs.has_changes == 'true'
        run: uv build
        working-directory: core

      - name: Publish to AWS CodeArtifact
        if: steps.check_changes.outputs.has_changes == 'true'
        run: uv publish --index proximal-package-index
        working-directory: core

      - name: Skip deployment message
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "::notice::Skipping core deployment - no changes detected since last release"</parameter>

  create_release:
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.outputs.has_changes != 'false'
    steps:</parameter>
      - uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          BASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('core/pyproject.toml', 'rb'))['project']['version'])")
          BASE_VERSION=$(echo $BASE_VERSION | sed -E 's/(a|b|rc)[0-9]+$//')

          if [ "$BRANCH" = "dev" ]; then
            EXISTING_BETAS=$(git tag -l "core-v${BASE_VERSION}b*" | sed -E "s/.*b([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_BETAS" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((EXISTING_BETAS + 1))
            fi
            VERSION="${BASE_VERSION}b${BETA_NUM}"
            PRERELEASE="true"
            RELEASE_NAME="Core v${VERSION} (Beta)"
          elif [ "$BRANCH" = "staging" ]; then
            EXISTING_RCS=$(git tag -l "core-v${BASE_VERSION}rc*" | sed -E "s/.*rc([0-9]+)$/\1/" | sort -n | tail -1)
            if [ -z "$EXISTING_RCS" ]; then
              RC_NUM=1
            else
              RC_NUM=$((EXISTING_RCS + 1))
            fi
            VERSION="${BASE_VERSION}rc${RC_NUM}"
            PRERELEASE="true"
            RELEASE_NAME="Core v${VERSION} (Release Candidate)"
          else
            VERSION="$BASE_VERSION"
            PRERELEASE="false"
            RELEASE_NAME="Core v${VERSION}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            gh release create core-v${{ steps.version.outputs.version }} \
              --generate-notes \
              --title "${{ steps.version.outputs.release_name }}" \
              --prerelease
          else
            gh release create core-v${{ steps.version.outputs.version }} \
              --generate-notes \
              --title "${{ steps.version.outputs.release_name }}"
          fi
