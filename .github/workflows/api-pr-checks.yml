name: API Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/api-pr-checks.yml"
      - ".github/actions/install-hurl/**"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  pyproject-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run pyproject dependency check
        run: uv run python _scripts/check_pyproject_dependencies.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ./api

      - name: Run Ruff formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check --diff ./api

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep star-syntax check
        run: uvx semgrep --error --config _scripts/rules/star-syntax.yaml api/app
      - name: Run Semgrep sqlalchemy query/filter check
        run: >
          uvx semgrep --error --config
          _scripts/rules/sqlalchemy-query-filter.yaml api/app
      - name: Run Semgrep with-async-db check
        run: >
          uvx semgrep --error --config
          _scripts/rules/with-async-db.yaml api/app
          --exclude api/app/dependencies.py
      - name: Run Semgrep no orjsonresponse response class check
        run: >
          uvx semgrep --error --config _scripts/rules/fastapi-no-orjsonresponse-response-class.yaml

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: install root project
        run: uv sync

      - name: run mypy from root project env
        run: >
          ROOT_DIR="${PWD}";
          uv run --project "${ROOT_DIR}" --directory api
          --with-editable "${ROOT_DIR}/api"
          mypy --config-file ../pyproject.toml -p app

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: run pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run pytest
        working-directory: api

  docstring-args:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Run docstring args check
        run: uv run _scripts/check_docstring_args.py api

  unused-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: Run unused routes check
        run: uv run python _scripts/check_unused_routes.py --mode openapi
        working-directory: api

  db-query-get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check for DbQuery.get usage
        run: |
          ./_scripts/db_query_get_check.sh

  project-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep project access check
        run: >
          uvx semgrep --error --config
          _scripts/rules/fastapi-project-id-access.yaml api/app

