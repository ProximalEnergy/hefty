name: API Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/api-pr-checks.yml"
      - ".github/actions/install-hurl/**"

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ./api

      - name: Run Ruff formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check --diff ./api

  star_syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep star-syntax check
        run: uvx semgrep --config _scripts/rules/star-syntax.yaml api/app

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install
        working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: run mypy
        run: uv run mypy --config-file ../pyproject.toml -p app # Add -v for verbosity
        working-directory: api

  deprecator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: run deprecator
        run: ./_pr_checks/deprecator.sh
        working-directory: api

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install
        working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: run pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run pytest
        working-directory: api

  docstring-args:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install

      - name: Run docstring args check
        run: uv run _scripts/check_docstring_args.py api

  unused-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install
        working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: Run unused routes check
        run: uv run python _scripts/check_unused_routes.py --mode openapi
        working-directory: api

  db-query-get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check for DbQuery.get usage
        run: |
          ./_scripts/db_query_get_check.sh

