name: API Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "core/**"
      - "pyproject.toml"
      - "uv.lock"
      - "_scripts/ast-grep/**"
      - "_scripts/ast_grep_check.sh"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/api-pr-checks.yml"
      - ".github/actions/install-hurl/**"
      - ".github/actions/resolve-dev-requirement/**"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  ruff:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: resolve root ruff requirement
        id: resolve_ruff
        uses: ./.github/actions/resolve-dev-requirement
        with:
          package-name: ruff

      - name: run ruff check from root config and version
        run: >
          uv run --with "${{ steps.resolve_ruff.outputs.requirement }}" ruff check
          --config pyproject.toml api

      - name: run ruff format check from root config and version
        run: >
          uv run --with "${{ steps.resolve_ruff.outputs.requirement }}" ruff
          format --check --diff
          --config pyproject.toml api

  star-syntax:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep star-syntax check
        run: ./_scripts/ast_grep_check.sh --rules python-enforce-keyword-only-args api/app

  sqlalchemy-query-filter:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy query filter check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-query-filter api/app

  sqlalchemy-array-agg:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy array_agg check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-array-agg api/app

  fastapi-project-id-access:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access api/app

  fastapi-project-id-access-prefix:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access prefix check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access-prefix api/app

  api-project-id-path:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep api project-id path check
        run: ./_scripts/ast_grep_check.sh --rules api-no-project-id-path-param-outside-project api/app

  forbidden-with-async-db:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep forbidden-with-async-db check
        run: ./_scripts/ast_grep_check.sh --rules forbidden-with-async-db-usage api/app

  dbquery-dataframe-cast:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep DbQuery DataFrame cast check
        run: >
          ./_scripts/ast_grep_check.sh
          --rules python-no-dbquery-dataframe-cast
          api/app

  mypy:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: install root project
        run: uv sync

      - name: run mypy from root project env
        run: >
          ROOT_DIR="${PWD}";
          uv run --project "${ROOT_DIR}" --directory api
          --with-editable "${ROOT_DIR}/api"
          mypy --config-file ../pyproject.toml -p app

  tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: run pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run pytest
        working-directory: api

  vulture:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: resolve root vulture requirement
        id: resolve_vulture
        uses: ./.github/actions/resolve-dev-requirement
        with:
          package-name: vulture

      - name: run vulture dead code check
        run: >
          uv run --with "${{ steps.resolve_vulture.outputs.requirement }}"
          vulture

  docstring-args:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run docstring args check
        run: >
          ./_scripts/ast_grep_check.sh
          --rules python-missing-args-in-docstring
          api/app

  unused-routes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: api

      - name: install project
        run: uv sync
        working-directory: api

      - name: Run unused routes check
        run: uv run python _scripts/check_unused_routes.py --mode openapi
        working-directory: api

  db-query-get:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check for DbQuery.get usage
        run: |
          ./_scripts/db_query_get_check.sh

