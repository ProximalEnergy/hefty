# ─────────────────────────────────────────────────────────────────────────────
# PR Title and Body Check
# ─────────────────────────────────────────────────────────────────────────────
# Automatically keeps PR titles prefixed with the sorted, bracketed list of
# every top-level folder touched by the PR's changed files.
#
# Example output:
#   [api, core, root] Add battery availability endpoint
#
# Rules enforced:
#   1. Every changed top-level folder appears in the prefix.
#   2. Files changed at the repo root contribute the literal scope "root".
#   3. Scopes are always alphabetically sorted.
#   4. Any existing [...] prefix is replaced — the description is preserved.
#   5. Titles use the form "[scope1, scope2] Description" with no colon.
#
# The title is updated via the GitHub API using the built-in GITHUB_TOKEN.
# No personal access tokens or external secrets are required.
#
# ─────────────────────────────────────────────────────────────────────────────
# PR BODY CHECKS
# ─────────────────────────────────────────────────────────────────────────────
# 1) High Impact Changes checkboxes
#    - Automatically checks/unchecks the boxes in the "## High Impact Changes"
#      section of the PR description based on which parts of the monorepo are
#      touched by the PR.
#
# 2) Checklist enforcement (author action required)
#    - Ensures both checklist items under "## Checklist" are explicitly marked
#      as either completed (`- [x] ...`) or not applicable (`- [N/A] ...`).
#    - If either item is missing or still unchecked (`- [ ] ...`), the workflow
#      comments on the PR and tags the author with clear instructions.
#
# ─────────────────────────────────────────────────────────────────────────────
# LIMITATIONS
# ─────────────────────────────────────────────────────────────────────────────
# - The GitHub API returns at most 100 files per page. PRs touching more than
#   100 files will have their scopes derived only from the first 100. If your
#   team regularly produces very large PRs, replace the curl call with a
#   paginated loop (see GitHub docs: List pull request files).
#
# - Scope matching is case-sensitive. A folder named "Core" and a title scope
#   "core" will be treated as different. Keep folder names lowercase or add
#   `| tr '[:upper:]' '[:lower:]'` to both sides of the comparison.
#
# ─────────────────────────────────────────────────────────────────────────────
# CUSTOMISATION
# ─────────────────────────────────────────────────────────────────────────────
# To ignore certain top-level folders (e.g. ".github", "docs"), add a grep
# filter after the SUBDIR_SCOPES line:
#
#   SUBDIR_SCOPES=$(echo "$FILES" \
#     | awk -F'/' 'NF>1 {print $1}' \
#     | grep -vxE '\.github|docs' \
#     | sort -u)
#
# To disable the "root" scope (i.e. silently ignore root-level file changes),
# simply delete the ROOT_SCOPE block and its entry in the printf merge below.
#
# ─────────────────────────────────────────────────────────────────────────────

name: PR Title and Body Check

on:
  pull_request:
    branches:
      - dev
    types:
      - opened # First push of a new PR
      - edited # PR title or body was manually changed
      - synchronize # New commits pushed to the PR branch
      - reopened # PR was re-opened after being closed

# The workflow needs write access to pull requests so it can PATCH PR fields.
# All other permissions are left at their default (read or none).
permissions:
  pull-requests: write
  issues: write

# Only allow one run per PR at a time. If a new event arrives (e.g. the
# `edited` event fired by our own title PATCH) while a run is still in
# progress, the in-progress run is cancelled and the new one takes over.
#
# This prevents a race condition where two concurrent runs each read the
# current title, independently prepend a new scope prefix, and produce a
# title with duplicate bracket groups like "[api] [api, core] Description".
concurrency:
  group: pr-title-and-body-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-title-and-body:
    if: |
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.head.ref != 'dev' &&
      github.event.pull_request.head.ref != 'staging' &&
      github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Auto-update PR title with sorted scopes
        env:
          # The current PR title, injected from the webhook payload.
          PR_TITLE: ${{ github.event.pull_request.title }}
          # Built-in token — no setup required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Full repo identifier, e.g. "my-org/my-repo".
          REPO: ${{ github.repository }}
        run: |
          # ── 1. Fetch the list of files changed in this PR ──────────────────
          #
          # The API returns an array of file objects; we extract just the
          # filename field. per_page=100 is the maximum allowed by GitHub.
          FILES=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            | jq -r '.[].filename')

          echo "Changed files:"
          echo "$FILES"
          echo "---"

          # ── 2. Derive scopes from changed file paths ───────────────────────
          #
          # Files in subdirectories (contain at least one "/"):
          #   "core/models/battery.py"  →  "core"
          #   "api/routes/health.py"    →  "api"
          SUBDIR_SCOPES=$(echo "$FILES" | awk -F'/' 'NF>1 {print $1}' | sort -u)

          # Files at the repo root (no "/" in their path):
          #   "README.md"      →  "root"
          #   ".env.example"   →  "root"
          # The `exit` after the first match means we only ever emit "root"
          # once, regardless of how many root-level files were changed.
          ROOT_SCOPE=$(echo "$FILES" | awk -F'/' 'NF==1 {print "root"; exit}')

          # Merge both sets, drop empty lines, sort and deduplicate.
          SCOPES=$(printf "%s\n%s\n" "$ROOT_SCOPE" "$SUBDIR_SCOPES" \
            | grep -v '^$' \
            | sort -u)

          # If the PR somehow has no changed files, leave the title alone.
          if [ -z "$SCOPES" ]; then
            echo "✅ No changes detected, leaving title as-is."
            exit 0
          fi

          # ── 3. Build the new scope prefix ──────────────────────────────────
          #
          # Convert the newline-separated list into "api, core, root" and
          # wrap it in brackets → "[api, core, root]".
          #
          # tr '\n' ','     → "api,core,root,"
          # sed 's/,/, /g'  → "api, core, root,"
          # sed 's/, $//'   → "api, core, root"   (trim trailing separator)
          SCOPE_LIST=$(echo "$SCOPES" | tr '\n' ',' | sed 's/,/, /g;s/, $//')
          NEW_PREFIX="[$SCOPE_LIST]"

          # ── 4. Strip any existing scope prefix(es) from the current title ──
          #
          # We use a GREEDY match that removes ALL leading [...] groups, not
          # just one. This is a belt-and-suspenders defence against the race
          # condition where two concurrent runs each prepend a bracket group,
          # producing a title like "[api] [api, core] Description". The
          # concurrency group above prevents this in most cases, but the
          # greedy strip ensures we self-heal if it ever slips through.
          #
          # We also strip one optional ":" separator and any surrounding
          # whitespace after the prefix so titles like "[api] : Add feature"
          # normalize to "[api] Add feature".
          #
          # Regex breakdown (extended regex via sed -E):
          #   ^              — start of string
          #   (              — begin repeating group
          #     \[           — literal "["
          #     [^]]*        — any characters that are not "]"
          #                    (in extended regex, ] as the first char after
          #                    [^ is treated as literal, so [^]] = "not ]")
          #     \]           — literal "]"
          #     [[:space:]]* — optional trailing whitespace
          #   )*             — zero or more of the above group
          #   :?             — optional ":" separator
          #   [[:space:]]*   — optional whitespace after the separator
          #
          # Examples:
          #   "[api, core] Add feature"        →  "Add feature"
          #   "[api, core] : Add feature"      →  "Add feature"
          #   "[api] [api, core] Add feature"  →  "Add feature"  (self-heal)
          #   "Add feature"                    →  "Add feature"  (no-op)
          BARE_TITLE=$(echo "$PR_TITLE" \
            | sed -E 's/^(\[[^]]*\][[:space:]]*)*:?[[:space:]]*//')

          # ── 5. Assemble and apply the new title ────────────────────────────
          NEW_TITLE="$NEW_PREFIX $BARE_TITLE"

          echo "Old title: $PR_TITLE"
          echo "New title: $NEW_TITLE"

          # Skip the API call if nothing actually changed.
          if [ "$NEW_TITLE" = "$PR_TITLE" ]; then
            echo "✅ Title already correct, no update needed."
            exit 0
          fi

          # PATCH the PR title via the GitHub REST API.
          #
          # We use `jq -n --arg` to build the JSON body rather than shell
          # string interpolation — this correctly escapes quotes, backslashes,
          # and other special characters that might appear in a PR title.
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            -d "$(jq -n --arg title "$NEW_TITLE" '{"title": $title}')"

          echo "✅ PR title updated successfully."

      - name: Auto-update PR high impact checkboxes
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              },
            );
            const paths = files.map((file) => file.filename);

            const impacts = {
              Core: paths.some((path) => path.startsWith("core/")),
              "pyproject.tomls": paths.some(
                (path) => path === "pyproject.toml" ||
                  path.endsWith("/pyproject.toml"),
              ),
              "package.jsons": paths.some(
                (path) => path === "package.json" ||
                  path.endsWith("/package.json"),
              ),
              alembic: paths.some(
                (path) => path.includes("_alembic_migrations/") ||
                  path.includes("/alembic/versions/"),
              ),
            };

            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const oldBody = pullRequest.body ?? "";

            let inHighImpactSection = false;
            const newBody = oldBody
              .split("\n")
              .map((line) => {
                if (/^#+\s+High Impact Changes\s*$/.test(line)) {
                  inHighImpactSection = true;
                  return line;
                }
                if (inHighImpactSection && /^#+\s+/.test(line)) {
                  inHighImpactSection = false;
                }
                if (!inHighImpactSection) {
                  return line;
                }

                const match = line.match(/^- \[[ xX]\] (.+?)\s*$/);
                if (!match || !(match[1] in impacts)) {
                  return line;
                }

                const label = match[1];
                const mark = impacts[label] ? "x" : " ";
                return `- [${mark}] ${label}`;
              })
              .join("\n");

            if (newBody === oldBody) {
              core.info("High Impact checkboxes already correct.");
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pullNumber,
              body: newBody,
            });
            core.info("Updated High Impact checkboxes.");

      - name: Validate PR checklist boxes (x / N/A)
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const authorLogin = context.payload.pull_request.user.login;

            const REQUIRED_CHECKLIST_LINES = [
              [
                "I confirmed there are no console warnings or errors in the `api`",
                "or `web-app` related to this change.",
              ].join(" "),
              [
                "I confirmed changed pages (from either `web-app` changes",
                "directly or via underlying `core`/`api` functions) loaded",
                "correctly.",
              ].join(" "),
            ];

            const COMMENT_MARKER = "<!-- pr-checklist-enforcer -->";

            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const body = pullRequest.body ?? "";
            const lines = body.split("\n");

            const checklistHeadingRe = /^##\s+Checklist\s*$/;
            const anyHeadingRe = /^##\s+/;

            const startIdx = lines.findIndex((line) =>
              checklistHeadingRe.test(line),
            );
            const checklistLines = [];
            if (startIdx !== -1) {
              for (let i = startIdx + 1; i < lines.length; i += 1) {
                const line = lines[i];
                if (anyHeadingRe.test(line)) {
                  break;
                }
                checklistLines.push(line);
              }
            }

            function normalizeMark(markRaw) {
              return markRaw.trim();
            }

            function isValidMark(mark) {
              if (/^x$/i.test(mark)) {
                return true;
              }
              if (/^n\/a$/i.test(mark)) {
                return true;
              }
              return false;
            }

            function findChecklistLine(targetText) {
              for (const line of checklistLines) {
                const match = line.match(/^- \[([^\]]+)\]\s+(.*)$/);
                if (!match) {
                  continue;
                }
                const text = match[2].trimEnd();
                if (text === targetText) {
                  return { line, markRaw: match[1], text };
                }
              }
              return null;
            }

            const failures = [];
            for (const requiredText of REQUIRED_CHECKLIST_LINES) {
              const found = findChecklistLine(requiredText);
              if (!found) {
                failures.push({
                  text: requiredText,
                  reason: "Missing checklist item",
                });
                continue;
              }

              const mark = normalizeMark(found.markRaw);
              if (!isValidMark(mark)) {
                failures.push({
                  text: requiredText,
                  reason: `Invalid checkbox value: "${mark}" (expected "x" or "N/A")`,
                });
              }
            }

            const existingComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pullNumber, per_page: 100 },
            );
            const priorBotComments = existingComments.filter(
              (c) => (c.body ?? "").includes(COMMENT_MARKER),
            );
            const prior = priorBotComments.length > 0 ? priorBotComments[0] : null;
            const extraPrior = priorBotComments.slice(1);

            if (failures.length === 0) {
              for (const comment of extraPrior) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
              }
              if (prior) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: prior.id,
                });
                core.info("Checklist valid; removed prior reminder comment.");
              } else {
                core.info("Checklist valid.");
              }
              return;
            }

            const commentBody = [
              COMMENT_MARKER,
              `@${authorLogin} please update the Checklist in the PR description.`,
              "",
              "Both checklist items under ## Checklist must be either checked ([x]) or marked not applicable ([N/A]).",
            ].join("\n");

            if (prior) {
              for (const comment of extraPrior) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
              }
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: prior.id,
                body: commentBody,
              });
              core.info("Updated existing checklist reminder comment.");
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: commentBody,
              });
              core.info("Created checklist reminder comment.");
            }
