name: Hardcoded Name Shorts Check

# This workflow checks for hardcoded name_shorts and name_short patterns in the codebase.
# It enforces the use of enums/constants instead of hardcoded string values for
# sensor types, device types, and other name_short identifiers.
#
# The check runs on pull requests to ensure code quality and consistency.
# If hardcoded patterns are found, the workflow will fail and block merging.
# Developers can add ignore comments for legitimate cases:
#   Python:   # noqa: hardcoded-name-short
#   TS/TSX:  // noqa: hardcoded-name-short

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "core/**"
      - "issues/**"
      - "microservices/**"
      - "pv-eem/**"
      - "super-admin/**"
      - "web-app/**"
      - "_scripts/name_shorts_ast_grep_check.sh"
      - ".mise.toml"
      - ".github/workflows/hardcoded-name-shorts-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hardcoded-name-shorts-check:
    name: Hardcoded Name Shorts Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run static name shorts check
        run: mise run root:static_name_shorts
