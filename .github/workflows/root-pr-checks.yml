name: Pyproject Dependency Check

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "**/pyproject.toml"
      - "uv.lock"
      - "_scripts/check_pyproject_dependencies.py"
      - ".github/actions/setup-uv-python-from-pyproject/**"
      - ".github/workflows/root-pr-checks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  uv-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
      - name: Check workspace lockfile is up to date
        run: uv lock --check

  pyproject-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run pyproject dependency check
        run: uv run python _scripts/check_pyproject_dependencies.py
