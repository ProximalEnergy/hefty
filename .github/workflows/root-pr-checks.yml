name: Pyproject Dependency Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "**/pyproject.toml"
      - "uv.lock"
      - "_scripts/check_pyproject_dependencies.py"
      - "_scripts/check_workspace_dependency_versions.py"
      - ".mise.toml"
      - ".github/actions/setup-uv-python-from-pyproject/**"
      - ".github/workflows/root-pr-checks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pyproject-changes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/github-script@v9
        id: changed
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              },
            );
            const changed = files.some(({ filename }) =>
              filename === "pyproject.toml" ||
              filename.endsWith("/pyproject.toml"),
            );
            core.setOutput("changed", String(changed));

  uv-lock:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
      - name: Check workspace lockfile is up to date
        run: uv lock --check

  pyproject-deps:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install_args: uv ripgrep
      - name: Run pyproject dependency check
        run: mise run root:pyproject_deps

  workspace-deps:
    needs: pyproject-changes
    if: |
      github.event.pull_request.draft == false &&
      needs.pyproject-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install_args: uv ripgrep
      - name: Run workspace dependency check
        run: mise run root:workspace_deps
