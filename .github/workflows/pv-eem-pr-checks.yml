name: PV-EEM Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "pv-eem/**"
      - "pyproject.toml"
      - ".github/workflows/pv-eem-pr-checks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pveem-types:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Install tools
        run: mise install
      - name: Run PV-EEM type checks
        run: mise run pveem:types

  pveem-ruff:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Install tools
        run: mise install
      - name: Run PV-EEM Ruff checks
        run: mise run pveem:ruff
