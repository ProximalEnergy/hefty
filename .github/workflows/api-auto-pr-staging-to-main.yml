name: API Auto PR Staging to Main

on:
  schedule:
    # This is 9:00 UTC (fixed) - converts to 2:00 AM MST (UTC-7) and 3:00 AM MDT (UTC-6)
    - cron: "0 9 * * 1,3" # Monday and Wednesday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  BRANCH_FROM: staging
  BRANCH_TO: main

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes between staging and main
        id: diff
        run: |
          echo "🔍 Checking for new commits in 'staging' not present in 'main'..."
          git fetch origin staging
          git fetch origin main
          COMMITS_AHEAD=$(git rev-list --count origin/main..origin/staging)
          echo "Commits ahead: $COMMITS_AHEAD"

          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "✅ No new commits to merge from 'staging' to 'main'. Exiting gracefully."
            echo "no_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if there are API changes in the commits
          API_CHANGES=$(git diff --name-only origin/main..origin/staging | grep "^api/" || true)

          if [ -z "$API_CHANGES" ]; then
            echo "ℹ️ No API changes found between staging and main branches. Skipping PR creation."
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "🚀 API changes detected. Proceeding to create PR."
            echo "API changes found:"
            echo "$API_CHANGES"
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Log environment info
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          echo "GitHub ref: $GITHUB_REF"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Event name: $GITHUB_EVENT_NAME"

      - name: Get commit authors
        id: get_authors
        if: steps.diff.outputs.no_changes == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            const compare = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: process.env.BRANCH_TO,
              head: process.env.BRANCH_FROM,
            });

            const commits = compare.data.commits;

            // Filter commits that affect the API directory
            const apiCommits = commits.filter(commit => {
              return commit.files && commit.files.some(file => file.filename.startsWith('api/'));
            });

            const logins = [
              ...new Set(apiCommits.map(c => c.author?.login).filter(Boolean))
            ];

            core.info(`Found ${commits.length} total commits, ${apiCommits.length} affecting API.`);
            core.info(`API Contributors (usernames): ${logins.join(', ')}`);

            core.setOutput('reviewers', logins.join(','));

      - name: Create PR
        id: create_pr
        if: steps.diff.outputs.no_changes == 'false'
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: process.env.BRANCH_TO,
              head: process.env.BRANCH_FROM,
              title: `Merge API changes from ${process.env.BRANCH_FROM} into ${process.env.BRANCH_TO}`,
              body: `This PR merges API changes from \`${process.env.BRANCH_FROM}\` into \`${process.env.BRANCH_TO}\`. Contributors are assigned as reviewers. Please review your changes carefully and approve if appropriate. If all reviewers approve, this PR will be merged automatically this evening.`,
              draft: false,
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
            core.setOutput('pr_number', pr.number.toString());

      - name: Assign reviewers
        if: steps.diff.outputs.no_changes == 'false' && steps.get_authors.outputs.reviewers != '' && steps.create_pr.outputs.pr_number != ''
        uses: actions/github-script@v6
        with:
          script: |
            const reviewers = '${{ steps.get_authors.outputs.reviewers }}'
              .split(',')
              .filter(Boolean);
            const prNumber = Number('${{ steps.create_pr.outputs.pr_number }}');

            core.info(`Assigning reviewers: ${reviewers.join(', ')} to PR #${prNumber}`);

            if (reviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers,
              });

              core.info('Reviewers successfully assigned.');
            } else {
              core.info('No reviewers to assign.');
            }

      - name: Log no changes found
        if: steps.diff.outputs.no_changes == 'true'
        run: echo "No API changes to merge. Workflow completed without creating a PR."
