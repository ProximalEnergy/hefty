name: KPI Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "kpi/**"
      - ".github/workflows/kpi-pr-checks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kpi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install project
        run: uv sync
        working-directory: kpi
      - name: Run KPI checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash kpi/_scripts/check.sh
