name: Nightly Checks

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-slow-check-changes:
    runs-on: ubuntu-latest
    outputs:
      pveem-pytest: ${{ steps.pveem-pytest.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install

      - name: Detect PV-EEM pytest changes
        id: pveem-pytest
        shell: bash
        run: |
          set -euo pipefail
          pveem_pytest_pattern='^(pv-eem/|core/|pyproject\.toml$|'
          pveem_pytest_pattern+='uv\.lock$|'
          pveem_pytest_pattern+='\.mise\.toml$|'
          pveem_pytest_pattern+='.github/workflows/nightly-checks\.yml$)'

          baseline="$(
            git rev-list -1 --before="24 hours ago" HEAD || true
          )"

          if [ -z "${baseline}" ]; then
            echo "No baseline found; running PV-EEM pytest."
            echo "has_changes=true" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          git diff --name-only "${baseline}..HEAD" >changed-files.txt

          if rg -q "${pveem_pytest_pattern}" changed-files.txt; then
            echo "PV-EEM pytest affected by changes since previous night."
            echo "has_changes=true" >>"${GITHUB_OUTPUT}"
          else
            echo "PV-EEM pytest unaffected by changes since previous night."
            echo "has_changes=false" >>"${GITHUB_OUTPUT}"
          fi

  pveem-pytest:
    needs: detect-slow-check-changes
    if: needs.detect-slow-check-changes.outputs.pveem-pytest == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install

      - name: Write PV-EEM .env
        env:
          ENVIRONMENT: DEV
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.DB_URI_DEV }}
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_USER: >-
            ${{ secrets.CLICKHOUSE_USER || secrets.CLICKHOUSE_USERNAME }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL || secrets.NIGHTLY_CHECKS_BOT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          required_names = [
              "ENVIRONMENT",
              "DATABASE_URL",
              "CLICKHOUSE_HOST",
              "CLICKHOUSE_USER",
              "CLICKHOUSE_PASSWORD",
              "WEBHOOK_URL",
              "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY",
              "AWS_S3_BUCKET_NAME",
          ]
          optional_names = [
              "AWS_S3_REGION",
          ]
          missing_names = [
              name for name in required_names if not os.environ.get(name)
          ]
          if missing_names:
              names = ", ".join(missing_names)
              raise SystemExit(f"Missing PV-EEM environment values: {names}")

          env_names = required_names + [
              name for name in optional_names if os.environ.get(name)
          ]
          env_path = Path("pv-eem/.env")
          with env_path.open("w") as env_file:
              for name in env_names:
                  value = json.dumps(os.environ[name])
                  env_file.write(f"{name}={value}\n")
          PY
          chmod 600 pv-eem/.env

      - name: Run PV-EEM pytest
        run: mise run pveem:pytest

  notify-nightly-result:
    needs:
      - detect-slow-check-changes
      - pveem-pytest
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Google Chat
        env:
          CHAT_WEBHOOK: ${{ secrets.NIGHTLY_CHECKS_BOT_URL }}
          DETECT_RESULT: ${{ needs.detect-slow-check-changes.result }}
          PVEEM_PYTEST_RESULT: ${{ needs.pveem-pytest.result }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CHAT_WEBHOOK}" ]; then
            echo "::warning::NIGHTLY_CHECKS_BOT_URL is not configured."
            exit 0
          fi

          python3 - <<'PY' >message.json
          from __future__ import annotations

          import json
          import os

          passed_results = {"success", "skipped"}
          detect_result = os.environ["DETECT_RESULT"]
          pveem_pytest_result = os.environ["PVEEM_PYTEST_RESULT"]
          is_success = (
              detect_result == "success"
              and pveem_pytest_result in passed_results
          )
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
              f"{os.environ['GITHUB_RUN_ID']}"
          )
          status_text = (
              "✅ *Nightly checks passed*"
              if is_success
              else "🟥🟥🟥 *Nightly checks failed*"
          )
          message = {
              "text": (
                  f"{status_text} on `dev`.\n"
                  f"detect-slow-check-changes: `{detect_result}`\n"
                  f"pveem-pytest: `{pveem_pytest_result}`\n"
                  f"<{run_url}|View workflow run>"
              ),
          }
          print(json.dumps(message))
          PY

          curl -X POST "${CHAT_WEBHOOK}" \
            -H "Content-Type: application/json" \
            --data @message.json
