name: Microservices Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "microservices/**"
      - "_scripts/ast-grep/**"
      - "_scripts/ast_grep_check.sh"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/microservices-pr-checks.yml"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  pyproject-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run pyproject dependency check
        run: uv run python _scripts/check_pyproject_dependencies.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(
            aws codeartifact get-authorization-token \
              --domain proximal-code-artifact-domain \
              --region us-east-2 \
              --query authorizationToken \
              --output text
          )
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" \
            >> $GITHUB_ENV

      - name: install root project
        run: uv sync

      - name: run ruff per microservice from root config
        run: |
          set -euo pipefail
          ROOT_DIR="${PWD}"

          for service_dir in "${ROOT_DIR}"/microservices/*; do
            [ -d "${service_dir}" ] || continue
            service_name="$(basename "${service_dir}")"

            case "${service_name}" in
              _*) continue ;;
            esac

            echo "Running ruff for microservice: ${service_name}"

            if [ -f "${service_dir}/pyproject.toml" ]; then
              uv run --project "${ROOT_DIR}" \
                --directory "${service_dir}" \
                --with-editable "${service_dir}" \
                ruff check --config "${ROOT_DIR}/pyproject.toml" .

              uv run --project "${ROOT_DIR}" \
                --directory "${service_dir}" \
                --with-editable "${service_dir}" \
                ruff format --check --diff \
                --config "${ROOT_DIR}/pyproject.toml" .
            else
              uv run --project "${ROOT_DIR}" \
                --directory "${service_dir}" \
                ruff check --config "${ROOT_DIR}/pyproject.toml" .

              uv run --project "${ROOT_DIR}" \
                --directory "${service_dir}" \
                ruff format --check --diff \
                --config "${ROOT_DIR}/pyproject.toml" .
            fi
          done

  star-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep star-syntax check
        run: ./_scripts/ast_grep_check.sh --rules python-enforce-keyword-only-args microservices

  sqlalchemy-query-filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy query filter check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-query-filter microservices

  sqlalchemy-array-agg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy array_agg check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-array-agg microservices

  fastapi-project-id-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access microservices

  fastapi-project-id-access-prefix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access prefix check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access-prefix microservices

  forbidden-with-async-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep forbidden-with-async-db check
        run: ./_scripts/ast_grep_check.sh --rules forbidden-with-async-db-usage microservices

  detect-microservice-changes:
    runs-on: ubuntu-latest
    outputs:
      calendar_notifications_lambda: ${{ steps.changes.outputs.calendar_notifications_lambda }}
      data_connection_outage_notifications_lambda: ${{ steps.changes.outputs.data_connection_outage_notifications_lambda }}
      kpi_pipeline_fetcher: ${{ steps.changes.outputs.kpi_pipeline_fetcher }}
      weather_alerts_lambda: ${{ steps.changes.outputs.weather_alerts_lambda }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            calendar_notifications_lambda:
              - 'microservices/calendar_notifications_lambda/**'
            data_connection_outage_notifications_lambda:
              - 'microservices/data_connection_outage_notifications_lambda/**'
            kpi_pipeline_fetcher:
              - 'microservices/kpi-pipeline-fetcher/**'
            weather_alerts_lambda:
              - 'microservices/weather_alerts_lambda/**'

  mypy-calendar-notifications-lambda:
    needs: detect-microservice-changes
    if: needs.detect-microservice-changes.outputs.calendar_notifications_lambda == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(
            aws codeartifact get-authorization-token \
              --domain proximal-code-artifact-domain \
              --region us-east-2 \
              --query authorizationToken \
              --output text
          )
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" \
            >> $GITHUB_ENV

      - name: install root project
        run: uv sync

      - name: run mypy for calendar_notifications_lambda
        run: |
          ROOT_DIR="${PWD}"
          SERVICE_DIR="${ROOT_DIR}/microservices/calendar_notifications_lambda"
          uv run --project "${ROOT_DIR}" \
            --directory "${SERVICE_DIR}" \
            --with-editable "${SERVICE_DIR}" \
            mypy --config-file "${ROOT_DIR}/pyproject.toml" .

  mypy-data-connection-outage-notifications-lambda:
    needs: detect-microservice-changes
    if: needs.detect-microservice-changes.outputs.data_connection_outage_notifications_lambda == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(
            aws codeartifact get-authorization-token \
              --domain proximal-code-artifact-domain \
              --region us-east-2 \
              --query authorizationToken \
              --output text
          )
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" \
            >> $GITHUB_ENV

      - name: install root project
        run: uv sync

      - name: run mypy for data_connection_outage_notifications_lambda
        run: |
          ROOT_DIR="${PWD}"
          SERVICE_DIR="${ROOT_DIR}/microservices/data_connection_outage_notifications_lambda"
          uv run --project "${ROOT_DIR}" \
            --directory "${SERVICE_DIR}" \
            --with-editable "${SERVICE_DIR}" \
            mypy --config-file "${ROOT_DIR}/pyproject.toml" .

  mypy-kpi-pipeline-fetcher:
    needs: detect-microservice-changes
    if: needs.detect-microservice-changes.outputs.kpi_pipeline_fetcher == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(
            aws codeartifact get-authorization-token \
              --domain proximal-code-artifact-domain \
              --region us-east-2 \
              --query authorizationToken \
              --output text
          )
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" \
            >> $GITHUB_ENV

      - name: install root project
        run: uv sync

      - name: run mypy for kpi-pipeline-fetcher
        run: |
          ROOT_DIR="${PWD}"
          SERVICE_DIR="${ROOT_DIR}/microservices/kpi-pipeline-fetcher"
          uv run --project "${ROOT_DIR}" \
            --directory "${SERVICE_DIR}" \
            --with-editable "${SERVICE_DIR}" \
            mypy --config-file "${ROOT_DIR}/pyproject.toml" .

  mypy-weather-alerts-lambda:
    needs: detect-microservice-changes
    if: needs.detect-microservice-changes.outputs.weather_alerts_lambda == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(
            aws codeartifact get-authorization-token \
              --domain proximal-code-artifact-domain \
              --region us-east-2 \
              --query authorizationToken \
              --output text
          )
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" \
            >> $GITHUB_ENV

      - name: install root project
        run: uv sync

      - name: run mypy for weather_alerts_lambda
        run: |
          ROOT_DIR="${PWD}"
          SERVICE_DIR="${ROOT_DIR}/microservices/weather_alerts_lambda"
          uv run --project "${ROOT_DIR}" \
            --directory "${SERVICE_DIR}" \
            --with-editable "${SERVICE_DIR}" \
            mypy --config-file "${ROOT_DIR}/pyproject.toml" .

  docstring-args:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run docstring args check
        run: >
          ./_scripts/ast_grep_check.sh
          --rules python-missing-args-in-docstring
          microservices
