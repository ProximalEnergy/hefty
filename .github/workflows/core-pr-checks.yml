name: Core Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "core/**"
      - "pyproject.toml"
      - "_scripts/ast-grep/**"
      - "_scripts/ast_grep_check.sh"
      - "_scripts/auto_bump_core_version.py"
      - "_scripts/prepare_core_publish_artifact.py"
      - "_scripts/pyproject_dependencies_changed.py"
      - "_scripts/check_docstring_args.py"
      - ".github/actions/resolve-dev-requirement/**"
      - ".github/workflows/core-pr-checks.yml"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  ruff:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: install core project
        working-directory: core
        run: uv sync --package core

      - name: resolve root ruff requirement
        id: resolve_ruff
        uses: ./.github/actions/resolve-dev-requirement
        with:
          package-name: ruff

      - name: run ruff check from root config and version
        run: >
          uv run --with "${{ steps.resolve_ruff.outputs.requirement }}" ruff check
          --config pyproject.toml core

      - name: run ruff format check from root config and version
        run: >
          uv run --with "${{ steps.resolve_ruff.outputs.requirement }}" ruff
          format --check --diff
          --config pyproject.toml core

  star-syntax:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep star-syntax check
        run: ./_scripts/ast_grep_check.sh --rules python-enforce-keyword-only-args core/src

  sqlalchemy-query-filter:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy query filter check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-query-filter core/src

  sqlalchemy-array-agg:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep sqlalchemy array_agg check
        run: ./_scripts/ast_grep_check.sh --rules python-disallow-sqlalchemy-array-agg core/src

  fastapi-project-id-access:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access core/src

  fastapi-project-id-access-prefix:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep fastapi project-id access prefix check
        run: ./_scripts/ast_grep_check.sh --rules fastapi-project-id-requires-access-prefix core/src

  forbidden-with-async-db:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep forbidden-with-async-db check
        run: ./_scripts/ast_grep_check.sh --rules forbidden-with-async-db-usage core/src

  dbquery-dataframe-cast:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ast-grep DbQuery DataFrame cast check
        run: >
          ./_scripts/ast_grep_check.sh
          --rules python-no-dbquery-dataframe-cast
          core/src

  mypy:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: install core project
        working-directory: core
        run: uv sync --package core

      - name: resolve root mypy requirement
        id: resolve_mypy
        uses: ./.github/actions/resolve-dev-requirement
        with:
          package-name: mypy

      - name: run mypy from root config and version
        working-directory: core
        run: >
          uv run --with "${{ steps.resolve_mypy.outputs.requirement }}" mypy
          --config-file ../pyproject.toml src/

  pytest:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: install core project
        working-directory: core
        run: uv sync --package core

      - name: run pytest
        working-directory: core
        run: uv run pytest tests

  validate-enums:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: install project
        run: uv sync --package core
        working-directory: core

      - name: Run enum validation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run -m src.core.enumerations
        working-directory: core

  vulture:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: resolve root vulture requirement
        id: resolve_vulture
        uses: ./.github/actions/resolve-dev-requirement
        with:
          package-name: vulture

      - name: run vulture dead code check
        run: >
          uv run --with "${{ steps.resolve_vulture.outputs.requirement }}"
          vulture

  docstring-args:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run docstring args check
        run: >
          ./_scripts/ast_grep_check.sh
          --rules python-missing-args-in-docstring
          core/src

  validate-version:
    name: Validate Version Bump
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == false &&
      github.base_ref == 'dev' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect release-relevant core inputs
        id: release_inputs
        run: |
          git fetch origin dev

          if git diff --quiet origin/dev...HEAD -- core/src/core; then
            CORE_SOURCE_CHANGED="false"
          else
            CORE_SOURCE_CHANGED="true"
          fi

          if git diff --quiet origin/dev...HEAD -- core/pyproject.toml; then
            CORE_PYPROJECT_CHANGED="false"
          else
            CORE_PYPROJECT_CHANGED="true"
          fi

          ROOT_DEP_CHANGED="$(
            python3 _scripts/pyproject_dependencies_changed.py \
              --base origin/dev \
              --head HEAD \
              --path pyproject.toml
          )"

          if [ "$CORE_SOURCE_CHANGED" = "true" ] || \
             [ "$CORE_PYPROJECT_CHANGED" = "true" ] || \
             [ "$ROOT_DEP_CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "core_source_changed=$CORE_SOURCE_CHANGED" >> $GITHUB_OUTPUT
          echo "core_pyproject_changed=$CORE_PYPROJECT_CHANGED" >> $GITHUB_OUTPUT
          echo "root_dep_changed=$ROOT_DEP_CHANGED" >> $GITHUB_OUTPUT

      - name: Compare with dev and bump patch if needed
        id: version_check
        if: steps.release_inputs.outputs.changed == 'true'
        run: |
          python3 _scripts/auto_bump_core_version.py \
            --base-revision origin/dev \
            >> "$GITHUB_OUTPUT"

      - name: Commit and push patched version
        if: steps.version_check.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/pyproject.toml
          git commit -m \
            "chore(core): auto-bump patch to ${{ steps.version_check.outputs.new_version }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Version status
        if: |
          steps.release_inputs.outputs.changed == 'true' &&
          steps.version_check.outputs.bumped != 'true'
        run: echo "Version already ahead of dev, skipping patch bump."

      - name: Version status for skipped changes
        if: steps.release_inputs.outputs.changed != 'true'
        run: |
          echo "No release-relevant core inputs changed."
          echo "Skipping auto-bump."
