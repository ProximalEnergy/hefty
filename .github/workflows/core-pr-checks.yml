name: Core Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "core/**"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/core-pr-checks.yml"
      - ".github/actions/setup-uv-python-from-pyproject/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  pyproject-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run pyproject dependency check
        run: uv run python _scripts/check_pyproject_dependencies.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ./core

      - name: Run Ruff formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check --diff
          src: ./core

  semgrep_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep star-syntax check
        run: uvx semgrep --error --config _scripts/rules/star-syntax.yaml core/src
      - name: Run Semgrep sqlalchemy query/filter check
        run: >
          uvx semgrep --error --config
          _scripts/rules/sqlalchemy-query-filter.yaml core/src

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: install project
        run: uv sync

      - name: run mypy
        run: |
          ROOT_DIR="$(pwd)"
          uv run --project "${ROOT_DIR}" --directory core --dev \
            --with-editable "${ROOT_DIR}/core" \
            mypy --config-file ../pyproject.toml src/

  validate-enums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"
          working-directory: core

      - name: install project
        run: uv sync
        working-directory: core

      - name: Run enum validation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run -m src.core.enumerations
        working-directory: core

  docstring-args:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up python
        uses: ./.github/actions/setup-uv-python-from-pyproject
        with:
          enable-cache: "true"

      - name: Run docstring args check
        run: uv run _scripts/check_docstring_args.py core

  validate-version:
    name: Validate Version Bump
    runs-on: ubuntu-latest
    if: >
      github.base_ref == 'dev' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compare with dev and bump patch if needed
        id: version_check
        run: |
          git fetch origin dev

          python - <<'PY'
          import os
          import re
          import subprocess
          import tomllib
          from pathlib import Path

          pyproject_path = Path("core/pyproject.toml")
          pr_version = tomllib.loads(
              pyproject_path.read_text(encoding="utf-8")
          )["project"]["version"]

          dev_toml = subprocess.run(
              ["git", "show", "origin/dev:core/pyproject.toml"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout
          dev_version = tomllib.loads(dev_toml)["project"]["version"]

          def parse_release(version: str) -> tuple[int, int, int]:
              match = re.match(r"^(\d+)\.(\d+)\.(\d+)", version)
              if match is None:
                  raise ValueError(
                      f"Unsupported version '{version}'. "
                      "Expected major.minor.patch."
                  )
              return tuple(int(part) for part in match.groups())

          pr_release = parse_release(pr_version)
          dev_release = parse_release(dev_version)

          print(f"PR version: {pr_version}")
          print(f"dev version: {dev_version}")

          bumped = "false"
          new_version = pr_version

          if pr_release < dev_release:
              major, minor, patch = dev_release
              new_version = f"{major}.{minor}.{patch + 1}"
              updated_text = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"\s*$',
                  f'version = "{new_version}"',
                  pyproject_path.read_text(encoding="utf-8"),
                  count=1,
              )
              pyproject_path.write_text(updated_text, encoding="utf-8")
              bumped = "true"
              print(
                  "PR version is lower than dev. "
                  f"Bumping patch version to {new_version}."
              )
          else:
              print("PR version is not lower than dev. No change needed.")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output_file:
              output_file.write(f"bumped={bumped}\n")
              output_file.write(f"new_version={new_version}\n")
          PY

      - name: Commit and push patched version
        if: steps.version_check.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/pyproject.toml
          git commit -m \
            "chore(core): auto-bump patch to ${{ steps.version_check.outputs.new_version }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Version status
        if: steps.version_check.outputs.bumped != 'true'
        run: echo "Version already >= dev, skipping patch bump."
