name: Core Pull Request Checks

on:
  pull_request:
    branches: [dev, staging, main]
    paths:
      - "core/**"
      - "_scripts/check_docstring_args.py"
      - ".github/workflows/core-pr-checks.yml"

permissions:
  id-token: write # This is crucial for OIDC authentication
  contents: read # You might also need this depending on your workflow

jobs:
  pyproject-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run pyproject dependency check
        run: uv run python _scripts/check_pyproject_dependencies.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ./core

      - name: Run Ruff formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check --diff
          src: ./core

  star_syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run Semgrep star-syntax check
        run: uvx semgrep --error --config _scripts/rules/star-syntax.yaml core/src

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install
        working-directory: core

      - name: install project
        run: uv sync
        working-directory: core

      - name: run mypy
        run: uv run mypy --config-file ../pyproject.toml src/ # Add -v for verbosity
        working-directory: core

  validate-enums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install
        working-directory: core

      - name: install project
        run: uv sync
        working-directory: core

      - name: Run enum validation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run -m src.core.enumerations
        working-directory: core

  docstring-args:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: set up python
        run: uv python install

      - name: Run docstring args check
        run: uv run _scripts/check_docstring_args.py core

  validate-version:
    name: Validate Version Bump
    runs-on: ubuntu-latest
    if: github.base_ref == 'dev'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync
        working-directory: core

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CODEARTIFACT }}
          aws-region: us-east-2 # This must match the AWS region of your CodeArtifact repository.

      - name: Check for Version Bump
        env:
          CODEARTIFACT_DOMAIN: proximal-code-artifact-domain
          CODEARTIFACT_REPOSITORY: proximal-hub
          PACKAGE_NAME: core
        working-directory: core
        run: |
          # Extract the current version from the pyproject.toml file.
          current_version=$(uv run -q python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "Current version in pyproject.toml: $current_version"

          # Fetch the latest published version from AWS CodeArtifact.
          echo "Fetching latest version from AWS CodeArtifact..."
          aws_output=$(aws codeartifact list-package-versions --domain $CODEARTIFACT_DOMAIN --repository $CODEARTIFACT_REPOSITORY --format pypi --package $PACKAGE_NAME --sort-by PUBLISHED_TIME 2>/dev/null || echo '{"versions":[]}')
          latest_version=$(echo $aws_output | jq -r '.versions[0].version')
          echo "Latest published version from CodeArtifact: $latest_version"

          # Compare only the numeric release segments (ignore rc/beta tags).
          # The script will exit with an error if the current release is not
          # strictly greater than the latest published release.
          uv run -q python - <<EOF
          from packaging.version import Version

          current = "$current_version".strip()
          latest = "$latest_version".strip()

          print(f"DEBUG: Comparing '{current}' vs '{latest}'")

          try:
              current_parsed = Version(current)
              latest_parsed = Version(latest)
          except Exception as e:
               print(f"::error::Version parsing failed: {e}")
               exit(1)

          current_release = current_parsed.release
          latest_release = latest_parsed.release

          if current_release <= latest_release:
              print(
                  "::error::Version check failed. The current version "
                  f"({current}) must be greater than the latest published "
                  f"version ({latest}). Please bump the version in "
                  "core/pyproject.toml."
              )
              exit(1)

          print(f"Version check passed. Current version ({current}) > Latest version ({latest}).")
          EOF
