name: Hardcoded Type ID Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [dev, staging, main]
    paths:
      - "api/**"
      - "core/**"
      - "web-app/**"
      - ".github/workflows/hardcoded-type-id-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hardcoded-type-id-check:
    name: Hardcoded Type ID Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run hardcoded type ID check
        run: |
          chmod +x _scripts/hardcoded_type_id_check.sh
          _scripts/hardcoded_type_id_check.sh
