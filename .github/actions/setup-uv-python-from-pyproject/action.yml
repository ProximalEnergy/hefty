name: Setup uv and Python from pyproject
description: >
  Install uv, read requires-python from pyproject.toml, and install that Python
  version with uv.

inputs:
  working-directory:
    description: Directory containing pyproject.toml
    required: false
    default: .
  enable-cache:
    description: Whether to enable setup-uv cache
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: ${{ inputs.enable-cache }}

    - name: Install Python from pyproject
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        requires_python=$(
          grep -m1 '^requires-python' pyproject.toml || true
        )

        if [ -z "${requires_python}" ]; then
          echo "::error::No requires-python entry found in pyproject.toml."
          exit 1
        fi

        python_version=$(
          echo "${requires_python}" \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1
        )

        if [ -z "${python_version}" ]; then
          echo "::error::Could not parse X.Y.Z from requires-python."
          echo "::error::requires-python: ${requires_python}"
          exit 1
        fi

        echo "Installing Python ${python_version} from pyproject.toml"
        uv python install "${python_version}"
