rules:
  - id: query-time-enum-default-options-stale-time
    message: "Use QUERY_TIME.* for defaultQueryOptions staleTime values."
    languages: [typescript]
    severity: WARNING
    patterns:
      - pattern-inside: |
          const defaultQueryOptions = {
            ...
          }
      - pattern: "staleTime: $VALUE"
      - pattern-not: "staleTime: QUERY_TIME.$TIME_KEY"

