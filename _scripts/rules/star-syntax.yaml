rules:
  - id: python-enforce-keyword-only-args
    message: "Function '$FUNC' must use '*' in parameters to enforce keyword arguments. This ensures API stability and clarity."
    languages: [python]
    severity: ERROR
    patterns:
      # Match functions with at least one positional/keyword argument
      - pattern-either:
          - pattern: |
              def $FUNC($ARG, ...):
                  ...
          - pattern: |
              async def $FUNC($ARG, ...):
                  ...
      
      # Exclude functions that already use keyword-only syntax (*, *args, or **kwargs)
      - pattern-not:
          pattern: |
            def $FUNC(..., *, ...):
                ...
      - pattern-not:
          pattern: |
            def $FUNC(..., *$ARGS, ...):
                ...
      - pattern-not:
          pattern: |
            def $FUNC(..., **$KWARGS, ...):
                ...

      # Exclude methods that only have 'self'
      - pattern-not:
          pattern: |
            def $FUNC(self):
                ...

      # Exclude FastAPI route decorators (app.get, router.post, etc.)
      - pattern-not-inside: |
          @$OBJ.get(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.post(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.put(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.delete(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.patch(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.options(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.head(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.route(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.api_route(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.websocket(...)
          def $FUNC(...): ...
      - pattern-not-inside: |
          @$OBJ.websocket_route(...)
          def $FUNC(...): ...

      # Exclude the bare @router decorator
      - pattern-not-inside: |
          @router
          def $FUNC(...): ...
