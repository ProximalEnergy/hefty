rules:
  - id: python-disallow-sqlalchemy-query
    message: >-
      SQLAlchemy query() is disallowed. Use execute() with select() instead.
    languages: [python]
    severity: ERROR
    patterns:
      - pattern: $OBJ.query(...)

  - id: python-disallow-sqlalchemy-filter
    message: >-
      SQLAlchemy filter() is disallowed. Use where() on a select() instead.
    languages: [python]
    severity: ERROR
    patterns:
      # Match generic case
      - pattern: $OBJ.filter(...)

      # Exclude variables starting with 'df' or 'lf' (DataFrames/LazyFrames)
      - pattern-not:
          patterns:
            - pattern: $DF.filter(...)
            - metavariable-regex:
                metavariable: $DF
                regex: ^(df|lf).*

      # Exclude Polars expressions (anything containing 'pl.')
      - pattern-not:
          patterns:
            - pattern: $OBJ.filter(..., $ARG, ...)
            - metavariable-regex:
                metavariable: $ARG
                regex: .*pl\..*

  - id: python-disallow-sqlalchemy-array-agg
    message: >-
      SQLAlchemy func.array_agg() is disallowed. Use joins instead.
    languages: [python]
    severity: ERROR
    patterns:
      - pattern: sa.func.array_agg(...)
  - id: sqlalchemy-no-return-first
    message: >-
      Do not return SQLAlchemy first() results; use DbQuery instead.
    languages:
      - python
    severity: ERROR
    paths:
      include:
        - "/**core/src**"
        - "/**api/app**"
    pattern: return $QUERY.first()
  - id: sqlalchemy-no-return-one-or-none
    message: >-
      Do not return SQLAlchemy one_or_none() results; use DbQuery
      instead.
    languages:
      - python
    severity: ERROR
    paths:
      include:
        - "/**core/src**"
        - "/**api/app**"
    patterns:
      - pattern: return $QUERY.one_or_none()
      - pattern-not-inside: |
          def _read_sqlalchemy(...):
              ...
  - id: sqlalchemy-no-return-scalar-one
    message: >-
      Do not return SQLAlchemy scalar_one() results; use DbQuery
      instead.
    languages:
      - python
    severity: ERROR
    paths:
      include:
        - "/**core/src**"
        - "/**api/app**"
    patterns:
      - pattern: return $QUERY.scalar_one()
      - pattern-not-inside: |
          def _read_sqlalchemy(...):
              ...
