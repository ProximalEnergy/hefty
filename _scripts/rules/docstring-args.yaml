rules:
  - id: python-missing-args-in-docstring
    languages: [python]
    message: "Function has arguments but missing Args section in docstring"
    severity: ERROR
    patterns:
      # Exclude routers and overloads
      - pattern-not: |
          @router.$METHOD(...)
          def $FUNC(...): ...
      - pattern-not: |
          @router.$METHOD(...)
          async def $FUNC(...): ...
      - pattern-not: |
          @overload
          def $FUNC(...): ...
      - pattern-not: |
          @overload
          async def $FUNC(...): ...

      - pattern-either:
          - patterns:
              - pattern-either:
                  - pattern: |
                      def $FUNC(..., $ARG, ...):
                          ...
                  - pattern: |
                      async def $FUNC(..., $ARG, ...):
                          ...
              - metavariable-regex:
                  metavariable: $ARG
                  regex: ^(?!self$|cls$).*$
              - pattern-not-regex: (?s).*(Args:|Arguments:).*

