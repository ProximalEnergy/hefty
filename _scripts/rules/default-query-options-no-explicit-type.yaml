rules:
  - id: default-query-options-no-explicit-type
    message: "defaultQueryOptions should not have an explicit type annotation."
    languages: [typescript]
    severity: ERROR
    patterns:
      - pattern: "const defaultQueryOptions: $TYPE = $EXPR"
    paths:
      include:
        - "**/web-app/src/api/**/*.ts"
        - "**/web-app/src/hooks/api.ts"
