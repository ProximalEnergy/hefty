rules:
  - id: sqlalchemy-return-method-instead-of-dbquery
    message: >-
      Returning SQLAlchemy result/query methods is disallowed here.
      Return a DbQuery and let callers choose output_type.
    languages:
      - python
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: return $OBJ.$METHOD(...)
          - pattern: return $OBJ.$MID(...).$METHOD(...)
          - pattern: return $OBJ.$MID1(...).$MID2(...).$METHOD(...)
      - metavariable-regex:
          metavariable: $METHOD
          regex: >-
            (?x)^(all|first|one|one_or_none|scalar|scalar_one|
            scalar_one_or_none|scalars|mappings|fetchone|
            fetchall|fetchmany|fetch_all|tuples|partitions|
            results|result)$
      - pattern-not-inside: |
          def _read_sqlalchemy(...):
              ...
