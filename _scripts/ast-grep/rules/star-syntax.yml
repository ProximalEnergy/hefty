id: python-enforce-keyword-only-args
message: >-
  Function must use '*' in parameters to enforce keyword arguments.
severity: error
language: Python
rule:
  all:
    - kind: function_definition
    - not:
        has:
          kind: parameters
          has:
            kind: keyword_separator
    - not:
        pattern: 'def $FUNC(): $$$BODY'
    - not:
        pattern: 'def $FUNC() -> $RET: $$$BODY'
    - not:
        pattern: 'async def $FUNC(): $$$BODY'
    - not:
        pattern: 'async def $FUNC() -> $RET: $$$BODY'
    - not:
        follows:
          stopBy: end
          any:
            - pattern: '@$OBJ.get($$$ARGS)'
            - pattern: '@$OBJ.post($$$ARGS)'
            - pattern: '@$OBJ.put($$$ARGS)'
            - pattern: '@$OBJ.delete($$$ARGS)'
            - pattern: '@$OBJ.patch($$$ARGS)'
            - pattern: '@$OBJ.options($$$ARGS)'
            - pattern: '@$OBJ.head($$$ARGS)'
            - pattern: '@$OBJ.route($$$ARGS)'
            - pattern: '@$OBJ.api_route($$$ARGS)'
            - pattern: '@$OBJ.websocket($$$ARGS)'
            - pattern: '@$OBJ.websocket_route($$$ARGS)'
            - pattern: '@router'
    - not:
        all:
          - pattern: 'def $FUNC(cls): $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        all:
          - pattern: 'def $FUNC(cls) -> $RET: $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        all:
          - pattern: 'def $FUNC(cls, $$$ARGS): $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        all:
          - pattern: 'def $FUNC(cls, $$$ARGS) -> $RET: $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        all:
          - pattern: 'async def $FUNC(cls, $$$ARGS): $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        all:
          - pattern: 'async def $FUNC(cls, $$$ARGS) -> $RET: $$$BODY'
          - follows:
              pattern: '@classmethod'
    - not:
        pattern: 'def $FUNC(self): $$$BODY'
    - not:
        pattern: 'def $FUNC(self) -> $RET: $$$BODY'
    - not:
        pattern: 'async def $FUNC(self): $$$BODY'
    - not:
        pattern: 'async def $FUNC(self) -> $RET: $$$BODY'
    - not:
        pattern: 'def $FUNC(self, $$$ARGS): $$$BODY'
    - not:
        pattern: 'def $FUNC(self, $$$ARGS) -> $RET: $$$BODY'
    - not:
        pattern: 'async def $FUNC(self, $$$ARGS): $$$BODY'
    - not:
        pattern: 'async def $FUNC(self, $$$ARGS) -> $RET: $$$BODY'
    - not:
        pattern: 'def lambda_handler($$$ARGS): $$$BODY'
    - not:
        pattern: 'def lambda_handler($$$ARGS) -> $RET: $$$BODY'
    - not:
        regex: '(?s).*#\s*no-star-syntax.*'
