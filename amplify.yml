version: 1
applications:
  - appRoot: web-app
    frontend:
      phases:
        preBuild:
          commands:
            - curl -LsSf https://mise.run | sh
            - $HOME/.local/bin/mise install node pnpm
            - rm -rf node_modules
            - >-
              $HOME/.local/bin/mise exec --
              env PNPM_STORE_DIR=.pnpm-store pnpm install --frozen-lockfile
            - 'echo "{\"version\": \"$(git rev-parse HEAD)\"}" > ./public/version.json'
        build:
          commands:
            - export NODE_OPTIONS=--max_old_space_size=10240
            - $HOME/.local/bin/mise exec -- pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
