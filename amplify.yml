version: 1
applications:
  - appRoot: web-app
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 22
            - rm -rf node_modules package-lock.json
            - npm install
            - 'echo "{\"version\": \"$(git rev-parse HEAD)\"}" > ./public/version.json'
        build:
          commands:
            - export NODE_OPTIONS=--max_old_space_size=10240
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
