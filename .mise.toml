depends = [
  "core:types",
  "core:ruff",
  "core:ruff_format",
  "core:star_syntax",
  "core:sqlalchemy",
  "core:vulture",
  "core:deptry",
  "core:enum",
  "core:docstring_args",
]

[tasks."core:types"]
description = "Run mypy type checking for core"
dir = "."
