[tasks."api:check-core-source"]
description = "Check which core dependency source is currently configured"
dir = "api"
run = "grep -A 1 '\\[tool.uv.sources\\]' pyproject.toml | grep core"

[tasks."api:sync"]
description = "Sync API dependencies and lockfile"
dir = "."
run = """
mise run api:switch-core && \
uv sync --directory api
"""

[tasks."kpi:switch-core:editable"]
description = "Switch kpi core dependency to editable local path"
run = "python3 kpi/_scripts/switch_core_source.py --mode editable"

[tasks."kpi:switch-core:codeartifact"]
description = "Switch kpi core dependency to CodeArtifact index"
run = "python3 kpi/_scripts/switch_core_source.py --mode codeartifact"

[tasks."kpi:check-core-source"]
