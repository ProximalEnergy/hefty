[tasks."core:pytest"]
description = "Run pytest for core"
dir = "core"
run = "pytest"

[tasks."core:enum"]
description = "Validate enums in core"
dir = "core"
run = "uv run _scripts/validate_enums.py"

[tasks."core:docstring_args"]
description = "Check docstring Args sections in core"
dir = "."
