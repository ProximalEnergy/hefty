ROOT_DIR="$(pwd)"
uv run --project "${ROOT_DIR}" --directory core --dev \
  --with-editable "${ROOT_DIR}/core" \
  mypy --config-file ../pyproject.toml src/
"""

[tasks."core:deptry"]
description = "Run deptry for core"
dir = "core"
run = "uv run deptry ."

[tasks."core:vulture"]
description = "Run vulture for core"
dir = "."
run = "uv run vulture core/src/core --min-confidence 100"

[tasks."core:ruff"]
description = "Run ruff linter for core"
dir = "."
run = "uv run --dev ruff check core/"

[tasks."core:ruff_format"]
description = "Run ruff formatter for core"
dir = "."
run = "uv run --dev ruff format core/"

[tasks."core:star_syntax"]
description = "Check for star syntax violations in core"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/star-syntax.yaml core/src"

[tasks."core:sqlalchemy"]
description = "Check for disallowed SQLAlchemy query/filter usage in core"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/sqlalchemy-query-filter.yaml core/src"

[tasks."core:pytest"]
description = "Run pytest for core"
dir = "core"
run = "pytest"

[tasks."core:enum"]
description = "Validate enums in core"
dir = "core"
run = "uv run _scripts/validate_enums.py"

[tasks."core:docstring_args"]
description = "Check docstring Args sections in core"
dir = "."
run = "uv run _scripts/check_docstring_args.py core"

[tasks."core:release"]
description = "Full release workflow for core (check, freeze, bump, commit, push)"
dir = "core"
depends = [
  "core:check",
  "core:freeze",
  "core:bump",
  "core:_add",
  "core:_commit",
  "core:_push",
]

[tasks."core:bump"]
description = "Bump core version (usage: mise run core:bump [patch|minor|major])"
dir = "core"
run = "uv version --bump ${1:-patch}"

[tasks."core:freeze"]
description = "Export frozen requirements.txt for core"
dir = "core"
run = """
uv export --frozen --no-emit-workspace --no-dev --no-editable \
  -o requirements.txt --no-hashes
"""

[tasks."core:_add"]
description = "Git add all changes in core"
dir = "core"
run = "git add ."

[tasks."core:_commit"]
description = "Git commit with 'Release' message for core"
dir = "core"
run = "git commit -m 'Release'"

[tasks."core:_push"]
description = "Git push changes for core"
dir = "core"
run = "git push"

[tasks."core:db"]
description = "Generate alembic migration"
usage = '''
arg "<description>" help="Migration description"
'''
dir = "core"
run = '''
echo "Generating alembic migration with description ${usage_description}"
uv run alembic revision --autogenerate -m "${usage_description}"
python3 _scripts/clean_alembic.py --latest
ROOT_DIR="$(pwd)/.."
uv run --project "${ROOT_DIR}" --dev ruff check \
  --config "${ROOT_DIR}/pyproject.toml" .

'''

[tasks."core:tag"]
description = "Create and push git tag based on core version"
dir = "core"
run = """
VERSION=$(python -c "import tomllib; \
  print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
git tag "v$VERSION"
git push origin "v$VERSION"
"""

# =============================================================================
# MICROSERVICES TASKS (runs in ./microservices directory)
# =============================================================================

[tasks."micro:check"]
description = "Run all quality checks for microservices"
dir = "."
depends = [
  "micro:types",
  "micro:ruff",
  "micro:ruff_format",
  "micro:star_syntax",
  "micro:sqlalchemy",
  "micro:docstring_args",
]

[tasks."micro:types"]
description = "Run mypy type checking for microservices"
dir = "."
run = """
ROOT_DIR="$(pwd)"
ROOT_MYPY_CONFIG="${ROOT_DIR}/pyproject.toml"
ROOT_AUTH_SCRIPT="${ROOT_DIR}/_scripts/auth_aws_codeartifact.sh"
HAS_AUTH=false
unset VIRTUAL_ENV
MYPY_SPEC="$(
  python3 -c '
import pathlib
import tomllib

data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
deps = data.get("dependency-groups", {}).get("dev", [])
for dep in deps:
    if isinstance(dep, str) and dep.startswith("mypy"):
        print(dep)
        break
'
)"

if [ -z "${MYPY_SPEC}" ]; then
  echo "mypy dependency not found in root pyproject.toml" >&2
  exit 1
fi

for service_dir in "${ROOT_DIR}"/microservices/*; do
  [ -d "${service_dir}" ] || continue
  service_name="$(basename "${service_dir}")"

  case "${service_name}" in
    _*) continue ;;
  esac

  echo "Running mypy for microservice: ${service_name}"

  if [ ! -f "${service_dir}/pyproject.toml" ]; then
    echo "Skipping ${service_name}: no pyproject.toml found"
    continue
  fi

  if grep -q "proximal-code-artifact-domain" "${service_dir}/pyproject.toml"; then
    if [ "${HAS_AUTH}" = false ]; then
      if [ ! -f "${ROOT_AUTH_SCRIPT}" ]; then
        echo "Missing auth script: ${ROOT_AUTH_SCRIPT}" >&2
        exit 1
      fi
      echo "Authenticating with AWS CodeArtifact"
      # shellcheck disable=SC1090
      . "${ROOT_AUTH_SCRIPT}"
      HAS_AUTH=true
    fi
  fi

  service_has_sqlalchemy="$(
    python3 -c '
import pathlib
import sys
import tomllib

path = pathlib.Path(sys.argv[1])
data = tomllib.loads(path.read_text())

def has_sqlalchemy(*, deps):
    for dep in deps or []:
        if isinstance(dep, str) and dep.lower().startswith("sqlalchemy"):
            return True
    return False

project = data.get("project", {})
if has_sqlalchemy(deps=project.get("dependencies", [])):
    print("true")
elif any(
    has_sqlalchemy(deps=dep_group)
    for dep_group in project.get("optional-dependencies", {}).values()
):
    print("true")
elif any(
    has_sqlalchemy(deps=dep_group)
    for dep_group in data.get("dependency-groups", {}).values()
):
    print("true")
else:
    print("false")
' "${service_dir}/pyproject.toml"
  )"

  mypy_config="${ROOT_MYPY_CONFIG}"
  cleanup_config=false
  if [ "${service_has_sqlalchemy}" != "true" ]; then
    mypy_config="$(
      python3 -c '
import tempfile

with tempfile.NamedTemporaryFile(
    prefix="micro-mypy.",
    suffix=".toml",
    delete=False,
) as temp_file:
    print(temp_file.name)
'
    )"
    cleanup_config=true
    python3 -c '
import pathlib
import re
import sys

src = pathlib.Path(sys.argv[1]).read_text()
dst = pathlib.Path(sys.argv[2])
pattern = r"^plugins\\s*=\\s*\\[\\\"sqlalchemy\\.ext\\.mypy\\.plugin\\\"\\]\\n?"
dst.write_text(re.sub(pattern, "", src, flags=re.MULTILINE))
' "${ROOT_MYPY_CONFIG}" "${mypy_config}"
  fi

  uv run \
    --project "${service_dir}" \
    --directory "${service_dir}" \
    --dev \
    --with "${MYPY_SPEC}" \
    mypy --config-file "${mypy_config}" .
  run_status=$?

  if [ "${cleanup_config}" = true ]; then
    rm -f "${mypy_config}"
  fi
  if [ "${run_status}" -ne 0 ]; then
    exit "${run_status}"
  fi
done
"""

[tasks."micro:ruff"]
description = "Run ruff linter for microservices"
dir = "."
run = "uv run --dev ruff check microservices/"

[tasks."micro:ruff_format"]
description = "Run ruff formatter for microservices"
dir = "."
run = "uv run --dev ruff format microservices/"

[tasks."micro:star_syntax"]
description = "Check for star syntax violations in microservices"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/star-syntax.yaml microservices"

[tasks."micro:sqlalchemy"]
description = "Check for disallowed SQLAlchemy query/filter usage in micro"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/sqlalchemy-query-filter.yaml microservices"

[tasks."micro:docstring_args"]
description = "Check docstring Args sections in microservices"
dir = "."
run = "uv run _scripts/check_docstring_args.py microservices"

