
[tools]
node = "24.13.0"
uv = "latest"
gh = "latest"
awscli = "latest"
ripgrep = "latest"
semgrep = "latest"

# =============================================================================
# MONOREPO-LEVEL TASKS
# =============================================================================

[tasks.onboarding]
description = "One time setup, installing packages, configuring aws"
run = """
brew install uv awscli hurl && \
uv sync && \
mise install && \
uv sync --directory core && \
mise run api:switch-core && \
uv sync --directory api && \
cd web-app && npm ci && npx node build-plotly-custom.js && \
cd .. && \
aws configure && \
(gh auth status >/dev/null 2>&1 || gh auth login) && \
mise run api:get_env && \
cp api/.env.from_parameter_store api/.env && \
mise run web:get_env && \
cp web-app/.env.from_parameter_store web-app/.env && \
mise run pveem:get_env && \
cp pv-eem/.env.from_parameter_store pv-eem/.env && \
mise run sql-admin:install
"""

[tasks.async-agent-setup]
description = "Setup async agent"
run = """
curl -LsSf https://astral.sh/uv/install.sh | sh && \
uv sync && \
mise install && \
uv sync --directory core && \
mise run api:switch-core && \
uv sync --directory api && \
cd web-app && npm ci && npx node build-plotly-custom.js && \
cd .. && \
mise run sql-admin:install
echo "Async agent setup complete"
"""

[tasks.upgrade-node-npm]
description = "Upgrade Node.js and npm to the latest versions"
run = "mise install node@latest npm@latest"

[tasks.sync-deps]
description = "Install and sync all dependencies across the monorepo"
run = """
uv sync && \
mise install && \
uv sync --directory core && \
mise run api:switch-core && \
uv sync --directory api && \
uv sync --directory kpi && \
cd web-app && npm ci && npx node build-plotly-custom.js && \
cd .. && \
mise run sql-admin:install
"""

[tasks.sync-deps-if-lock-changed]
description = "Run sync-deps when lockfiles have changed"
run = """
LOCKFILE_PATTERN='^(uv\\.lock|core/uv\\.lock|api/uv\\.lock|sql-admin/uv\\.lock|\
web-app/package-lock\\.json)$'

BASE_REF=""
if git show-ref --verify --quiet refs/remotes/origin/dev; then
  BASE_REF="$(git merge-base HEAD origin/dev)"
elif git show-ref --verify --quiet refs/heads/dev; then
  BASE_REF="$(git merge-base HEAD dev)"
else
  BASE_REF="HEAD~1"
fi

CHANGED_FILES="$(
  {
    git diff --name-only "${BASE_REF}...HEAD"
    git diff --name-only HEAD
  } | sort -u
)"

if echo "${CHANGED_FILES}" | grep -E -q "${LOCKFILE_PATTERN}"; then
  mise run sync-deps
else
  echo "No lockfile changes detected; skipping sync-deps."
fi
"""

[tasks.dev]
description = "Run API and web-app development servers concurrently"
usage = '''
  flag "--no-sync" help="Skip syncing with dev branch"
'''
run = """
if [ "${usage_no_sync:-false}" = "true" ]; then
  mise run api:switch-core && \
  mise run sync-deps-if-lock-changed && \
  ./_scripts/run_dev.sh
else
  mise run sync && \
  mise run api:switch-core && \
  mise run sync-deps-if-lock-changed && \
  ./_scripts/run_dev.sh
fi
"""


[tasks.pr]
description = "Create/update PR via automation script"
dir = "."
run = "./_scripts/prepare_pr.sh"

[tasks.preview]
description = "Run API and web-app preview servers concurrently"
depends = ["sync", "api:switch-core"]
run = ["mise run install", "mise run web:build", "./_scripts/run_preview.sh"]

[tasks.check]
description = "Run quality checks based on the diff vs dev"
depends = ["api:switch-core"]
usage = '''
  flag "--static" help="Skip non-static tests"
  flag "--all" help="Run all checks without diff filtering"
  flag "--offline" help="Skip checks that need network access"
  flag "--all-warnings" help="Run warning checks for all areas"
  flag "--quiet" help="Keep reduced output (default behavior)"
  flag "--verbose" help="Show full output for successful checks"
'''
run = """
ALL_ARGS=""
if [ "${usage_all:-false}" = "true" ]; then
  ALL_ARGS="--all"
fi
if [ "${usage_static:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --static"
fi
if [ "${usage_offline:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --offline"
fi
if [ "${usage_all_warnings:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --all-warnings"
fi
if [ "${usage_quiet:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --quiet"
fi
if [ "${usage_verbose:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --verbose"
fi
./_scripts/run_checks.sh ${ALL_ARGS}
"""

[tasks.depends]
description = "Remove unused dependencies and upgrade old dependencies"
run = """
mise run core:deptry && \
mise run api:deptry && \
mise run web:knip && \
uv tree --outdated && \
npm outdated
"""

[tasks.sync]
description = "Sync current branch with latest dev from remote"
run = """
echo "Fetching latest changes from remote..." && \
git fetch origin && \
echo "Pulling latest dev branch..." && \
git checkout dev && \
git pull origin dev && \
echo "Switching back to original branch and merging dev..." && \
git checkout - && \
git merge dev && \
echo "Sync complete! Your branch is now up to date with dev."
"""

[tasks.worktree]
description = "Create a new git worktree with environment files and open in editor"
usage = '''
  arg "<folder>" help="Name of the folder to create (sibling to current directory)"
  arg "<branch>" help="Name of the branch to create"
  flag "-e --editor <editor>" help="Editor to open the worktree in (cursor, zed)"
  flag "-x --existing" help="Check out existing branch (fetch and resolve name)"
'''
run = "./_scripts/worktree.sh ${usage_folder} ${usage_branch} ${usage_editor:-} ${usage_existing:+--existing}"

[tasks."root:hardcoded_type_id"]
description = "Run hardcoded type ID check on entire monorepo"
dir = "."
run = "./_scripts/hardcoded_type_id_check.sh"

[tasks."root:hardcoded_name_shorts"]
description = "Run hardcoded name shorts check on entire monorepo"
dir = "."
run = "./_scripts/hardcoded_name_shorts_check.sh"

[tasks."root:sqlalchemy_return"]
description = "Warn on SQLAlchemy return methods in changed Python files"
dir = "."
run = "./_scripts/sqlalchemy_return_check.sh"

[tasks."root:semgrep"]
description = "Run all semgrep quality checks on the monorepo"
dir = "."
run = "./_scripts/semgrep_check.sh"

[tasks."root:no_package_json"]
description = "Fail when package.json or package-lock.json exists at repo root"
dir = "."
run = """
if [ -f package.json ] || [ -f package-lock.json ]; then
  echo "Error: package.json or package-lock.json found in the root directory."
  echo "These files should not exist at the monorepo root."
  exit 1
fi
echo "No package.json or package-lock.json found in the root directory."
"""

[tasks."root:pyproject_dependencies"]
description = "Check for undeclared or mismatched dependencies in pyproject.toml"
dir = "."
run = "uv run --no-sync python _scripts/check_pyproject_dependencies.py"

[tasks."root:codegen"]
description = "Automatically generate interfaces"
dir = "."
run = "./_scripts/sync_api_and_ts_types_and_enums.sh"

[tasks."root:ruff"]
description = "Run ruff linter on entire monorepo"
dir = "."
run = "uv run --dev ruff check core/ api/ microservices/ sql-admin/ pv-eem/"

[tasks."root:ruff_format"]
description = "Run ruff formatter on entire monorepo"
dir = "."
run = "uv run --dev ruff format core/ api/ microservices/ sql-admin/ pv-eem/"

# =============================================================================
# CORE TASKS (runs in ./core directory)
# =============================================================================

[tasks."git:diff"]
description = "Interactively checkout files from another branch"
dir = "."
usage = '''
  arg "[branch]" help="The source branch to checkout files from (optional)"
'''
run = "python3 _scripts/git_checkout_tui.py ${usage_branch:-}"

[tasks."core:check"]
