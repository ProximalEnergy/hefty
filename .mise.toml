run = "./_scripts/web_jsx_calcs_check.sh"

[tasks."web:default-query-options-no-explicit-type"]
description = "Check for explicit type annotation on defaultQueryOptions"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/default-query-options-no-explicit-type.yaml"

[tasks."web:screenshot"]
description = "Screenshot routes inferred from git diff vs dev into _screenshot/"
dir = "."
run = "uv run python _scripts/web_screenshot.py"

# =============================================================================
# SQL-ADMIN TASKS (runs in ./sql-admin directory)
# =============================================================================

[tasks."sql-admin:install"]
description = "Install dependencies for sql-admin"
dir = "sql-admin"
run = "uv sync"

[tasks."sql-admin:ruff"]
description = "Run ruff linter for sql-admin"
dir = "."
run = "uv run --dev ruff check sql-admin/"

[tasks."sql-admin:run"]
description = "Run the sql-admin server"
dir = "sql-admin"
usage = '''
  arg "[schema]" help="Database schema to use (defaults to 'project_default')"
'''
run = """
export SQL_ADMIN_SCHEMA=${usage_schema:-project_default}
uv run uvicorn main:app --reload --host 0.0.0.0 --port 8001
"""

[tasks."sql-admin:open"]
description = "Run sql-admin and open it in the default browser"
dir = "sql-admin"
run = """
uv run main.py &
server_pid=$!
sleep 2
uv run python -m webbrowser "http://127.0.0.1:8001/admin"
wait $server_pid
"""

# =============================================================================
# PV-EEM TASKS (runs in ./pv-eem directory)
# =============================================================================

[tasks."pveem:get_env"]
description = "Generate .env file from AWS Systems Manager Parameter Store"
dir = "api"
run = "uv run _scripts/generate_pveem_env_from_parameter_store.py"

[tasks."pveem:check"]
description = "Run project quality checks for pv-eem"
dir = "pv-eem"
run = """
mise run pveem:version-check && \
mise run pveem:types && \
mise run pveem:ruff && \
mise run pveem:pytest
"""

[tasks."pveem:version-check"]
description = "Ensure local pv-eem version exceeds deployed Lambda version"
dir = "pv-eem"
run = "uv run python _scripts/check_deployed_version.py"

[tasks."pveem:types"]
description = "Run mypy type checks for pv-eem"
dir = "pv-eem"
run = """
mypy_requirement="$(
  python3 - <<'PY'
import tomllib
from pathlib import Path

root_project = tomllib.load(Path("../pyproject.toml").open("rb"))
for dependency in root_project["dependency-groups"]["dev"]:
    if dependency.startswith("mypy"):
        print(dependency, end="")
        break
else:
    raise SystemExit("mypy dependency not found in root pyproject.toml")
PY
)"
uv run --project . --with "${mypy_requirement}" \
  mypy --config-file ../pyproject.toml src/
"""

[tasks."pveem:ruff"]
description = "Run ruff lint checks for pv-eem"
dir = "."
run = """
uv run --dev ruff check pv-eem/
"""

[tasks."pveem:pytest"]
description = "Run test suite for pv-eem"
dir = "pv-eem"
run = "uv run pytest"

[tasks."pveem:live_test"]
description = "Run a live sun_pond pv-eem sanity check"
dir = "pv-eem"
run = "uv run python _scripts/live_test.py"

[tasks."pveem:push-image"]
description = "Build pv-eem image and push latest plus pyproject version tags"
dir = "pv-eem"
run = "bash _scripts/push_image.sh"

[tasks."pveem:cdk-deploy"]
description = "Push image, then deploy pv-eem to PROD unless overridden"
dir = "pv-eem"
run = "bash _scripts/cdk_deploy.sh"

[tasks."pveem:deploy"]
description = "Run checks, then call pveem:cdk-deploy"
dir = "pv-eem"
run = "bash _scripts/deploy.sh"

[tasks."pveem:bump-patch"]
description = "Bump project version (patch) for pv-eem"
dir = "pv-eem"
run = "uv version --bump patch"

[tasks."pveem:bump-minor"]
description = "Bump project version (minor) for pv-eem"
dir = "pv-eem"
run = "uv version --bump minor"

[tasks."pveem:bump-major"]
description = "Bump project version (major) for pv-eem"
dir = "pv-eem"
run = "uv version --bump major"
