description = "Generate .env file from AWS Systems Manager Parameter Store"
dir = "api"
run = "uv run _scripts/generate_pveem_env_from_parameter_store.py"

[tasks."pveem:check"]
description = "Run project quality checks for pv-eem"
dir = "pv-eem"
run = """
mise run pveem:version-check && \
mise run pveem:types && \
mise run pveem:ruff && \
mise run pveem:pytest
"""

[tasks."pveem:version-check"]
description = "Ensure local pv-eem version exceeds deployed Lambda version"
dir = "pv-eem"
run = "uv run python _scripts/check_deployed_version.py"

[tasks."pveem:types"]
description = "Run mypy type checks for pv-eem"
dir = "pv-eem"
run = """
mypy_requirement="$(
  python3 - <<'PY'
import tomllib
from pathlib import Path

root_project = tomllib.load(Path("../pyproject.toml").open("rb"))
for dependency in root_project["dependency-groups"]["dev"]:
    if dependency.startswith("mypy"):
        print(dependency, end="")
        break
else:
    raise SystemExit("mypy dependency not found in root pyproject.toml")
PY
)"
uv run --project . --with "${mypy_requirement}" \
  mypy --config-file ../pyproject.toml src/
"""

[tasks."pveem:ruff"]
description = "Run ruff lint checks for pv-eem"
dir = "."
run = """
uv run --dev ruff check pv-eem/
"""

[tasks."pveem:pytest"]
description = "Run test suite for pv-eem"
dir = "pv-eem"
run = "uv run pytest -n auto"

[tasks."pveem:live_test"]
description = "Run a live sun_pond pv-eem sanity check"
dir = "pv-eem"
run = "uv run python _scripts/live_test.py"

[tasks."pveem:push-image"]
description = "Build pv-eem image and push latest plus pyproject version tags"
dir = "pv-eem"
run = "bash _scripts/push_image.sh"

[tasks."pveem:cdk-deploy"]
description = "Push image, then deploy pv-eem to PROD unless overridden"
dir = "pv-eem"
run = "bash _scripts/cdk_deploy.sh"

[tasks."pveem:deploy"]
description = "Run checks, then call pveem:cdk-deploy"
dir = "pv-eem"
run = "bash _scripts/deploy.sh"

