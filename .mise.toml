min_version = "2026.4.18"

[tools]
uv = "0.11.7"
gh = "2.91.0"
awscli = "2.34.31"
ripgrep = "15.1.0"
ast-grep = "0.42.1"
pnpm = "10.33.2"

# =============================================================================
# MONOREPO-LEVEL TASKS
# =============================================================================

[tasks.onboarding]
description = "One time setup, installing packages, configuring aws"
run = """
brew install uv awscli hurl && \
uv sync && \
mise install && \
uv sync --directory core && \
uv sync --directory api && \
mise run web:install && \
aws configure && \
(gh auth status >/dev/null 2>&1 || gh auth login) && \
mise run api:get_env && \
cp api/.env.from_parameter_store api/.env && \
mise run web:get_env && \
cp web-app/.env.from_parameter_store web-app/.env && \
mise run pveem:get_env && \
cp pv-eem/.env.from_parameter_store pv-eem/.env
"""

[tasks.async-agent-setup]
description = "Setup async agent"
run = """
curl -LsSf https://astral.sh/uv/install.sh | sh && \
uv sync && \
mise install && \
uv sync --directory core && \
uv sync --directory api && \
mise run web:install && \
echo "Async agent setup complete"
"""

[tasks.upgrade-node-pnpm]
description = "Upgrade Node.js and pnpm to the latest versions"
run = "mise install node@latest pnpm@latest"

[tasks.sync-deps]
description = "Install and sync all dependencies across the monorepo"
run = """
uv sync --package mono --package core --package api && \
mise install && \
(
  mise run web:install || \
  mise run web:install --non-strict
) && \
./_scripts/web_deps_hash.sh write
"""

[tasks.sync-deps-if-needed]
description = "Run sync-deps when dependency environments are stale"
run = """
#!/usr/bin/env bash
set -uo pipefail

NEEDS_SYNC=false
UV_CHANGE_PATTERN='^Would (create|download|install|remove|uninstall|update)'

uv_sync_dry_run_shows_changes() {
  local output

  if output="$(
    env -u VIRTUAL_ENV uv sync --dry-run --inexact \
      --package mono --package core --package api 2>&1
  )"; then
    if echo "${output}" | rg -q "${UV_CHANGE_PATTERN}"; then
      echo "Stale uv environment: dev workspace packages"
      return 0
    fi
    return 1
  fi

  echo "uv sync --dry-run failed for dev workspace packages; syncing dependencies."
  echo "${output}"
  return 0
}

if uv_sync_dry_run_shows_changes; then
  NEEDS_SYNC=true
fi

if ! ./_scripts/web_deps_hash.sh check; then
  NEEDS_SYNC=true
fi

if [ "${NEEDS_SYNC}" = "true" ]; then
  mise run sync-deps
else
  echo "Dependency environments are current; skipping sync-deps."
fi
"""

[tasks.dev]
description = "Run API and web-app development servers concurrently"
usage = '''
  flag "--no-sync" help="Skip syncing with dev branch"
'''
run = """
if [ "${usage_no_sync:-false}" = "true" ]; then
  mise run sync-deps-if-needed && \
  ./_scripts/run_dev.sh
else
  mise run sync && \
  mise run sync-deps-if-needed && \
  ./_scripts/run_dev.sh
fi
"""


[tasks.pr]
description = "Create/update PR via automation script"
dir = "."
run = "./_scripts/prepare_pr.sh"

[tasks.preview]
description = "Run API and web-app preview servers concurrently"
depends = ["sync"]
run = ["mise run web:install", "mise run web:build", "./_scripts/run_preview.sh"]

[tasks.check]
description = "Run quality checks"
usage = '''
  flag "--static" help="Skip non-static tests"
  flag "--all" help="Run all checks without diff filtering"
  flag "--diff-only" help="Run checks based on the diff vs dev (default)"
  flag "--offline" help="Skip checks that need network access"
  flag "--all-warnings" help="Run warning checks for all areas"
  flag "--quiet" help="Keep reduced output (default behavior)"
  flag "--verbose" help="Show full output for successful checks"
'''
run = """
ALL_ARGS=""
if [ "${usage_all:-false}" = "true" ]; then
  ALL_ARGS="--all"
fi
if [ "${usage_diff_only:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --diff-only"
fi
if [ "${usage_static:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --static"
fi
if [ "${usage_offline:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --offline"
fi
if [ "${usage_all_warnings:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --all-warnings"
fi
if [ "${usage_quiet:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --quiet"
fi
if [ "${usage_verbose:-false}" = "true" ]; then
  ALL_ARGS="${ALL_ARGS} --verbose"
fi

./_scripts/run_checks.sh ${ALL_ARGS}
"""

[tasks.depends]
description = "Remove unused dependencies and upgrade old dependencies"
run = """
mise run core:deptry && \
mise run api:deptry && \
mise run web:knip && \
uv tree --outdated && \
cd web-app && pnpm outdated
"""

[tasks.sync]
description = "Sync current branch with latest dev from remote"
run = """
echo "Fetching latest changes from remote..." && \
git fetch origin && \
echo "Pulling latest dev branch..." && \
git checkout dev && \
git pull origin dev && \
echo "Switching back to original branch and merging dev..." && \
git checkout - && \
git merge dev && \
echo "Sync complete! Your branch is now up to date with dev."
"""

