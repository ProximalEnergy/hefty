[tasks."root:pnpm_version_sync"]
description = "Check that pnpm version in .mise.toml matches packageManager in web-app/package.json"
dir = "."
run = """
#!/usr/bin/env bash
MISE_PNPM_VERSION=$(mise current pnpm)
PKG_PNPM_VERSION=$(cat web-app/package.json | grep '"packageManager"' | grep -o 'pnpm@[0-9]*\\.[0-9]*\\.[0-9]*' | cut -d'@' -f2 || true)

if [ "$MISE_PNPM_VERSION" != "$PKG_PNPM_VERSION" ]; then
    echo "❌ pnpm version mismatch!"
    echo ".mise.toml: $MISE_PNPM_VERSION"
    echo "web-app/package.json: $PKG_PNPM_VERSION"
    echo "Run 'mise run upgrade-node-pnpm' to sync them, or manually update web-app/package.json"
    exit 1
fi
echo "✅ pnpm versions match ($MISE_PNPM_VERSION)"
"""



