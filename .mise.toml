[tasks."api:pytest"]
description = "Run pytest for api"
dir = "api"
run = "uv run pytest"

[tasks."api:star_syntax"]
description = "Check for star syntax violations in api"
dir = "."
run = "uv run semgrep --error --config _scripts/rules/star-syntax.yaml api/app"

[tasks."api:sqlalchemy"]
description = "Check for disallowed SQLAlchemy query/filter usage in api"
dir = "."
