hurl --location --variable baseURL=http://127.0.0.1:8000 \
  --variables-file .env --test ./_smoke_testing/hurl/get/*
"""

[tasks."api:docstring_args"]
description = "Check docstring Args sections in api"
dir = "."
run = "uv run _scripts/check_docstring_args.py api"

[tasks."api:db_query_get"]
description = "Check for DbQuery.get usage in api"
