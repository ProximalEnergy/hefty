  "api:types",
  "api:star_syntax",
  "api:sqlalchemy",
  "api:ruff",
  "api:format",
  "api:pytest",
  "api:deptry",
  "api:vulture",
  "api:docstring_args",
  "api:db_query_get",
  "api:with_async_db",
  "api:unused_routes",
]
run = """
mise run api:hurl || true
"""

[tasks."api:ruff"]
description = "Run ruff linter for api"
dir = "."
run = "uv run --dev ruff check api/"

[tasks."api:format"]
description = "Run ruff formatter for api"
dir = "."
run = "uv run --dev ruff format api/"

[tasks."api:vulture"]
description = "Run vulture for api"
dir = "."
