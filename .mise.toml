
# =============================================================================
# MONOREPO-LEVEL TASKS
# =============================================================================

[tasks.dev]
description = "Run API and web-app development servers concurrently"
usage = '''
  flag "--no-sync" help="Skip syncing with dev branch"
'''
run = """
if [ "${usage_no_sync:-false}" = "true" ]; then
  mise run api:switch-core && \
  mise run install && \
  ./_scripts/run_dev.sh
else
  mise run sync && \
  mise run api:switch-core && \
  mise run install && \
  ./_scripts/run_dev.sh
fi
"""

[tasks.preview]
description = "Run API and web-app preview servers concurrently"
depends = ["sync", "api:switch-core"]
run = ["mise run install", "mise run web:build", "./_scripts/run_preview.sh"]

[tasks.check]
description = "Run all quality checks across the entire monorepo"
depends = ["api:switch-core"]
usage = '''
  flag "--static" help="Skip non-static tests (like hurl)"
'''
run = """
if [ "${usage_static:-false}" = "true" ]; then
  ./_scripts/run_checks.sh --static
else
  ./_scripts/run_checks.sh
fi
"""

[tasks.install]
description = "Install and sync all dependencies across the monorepo"
run = """
cd core && uv sync && cd .. && \
mise run api:switch-core && \
cd api && uv sync && cd .. && \
cd web-app && npm install && npx node build-plotly-custom.js && \
cd .. && \
mise run sql-admin:install && \
brew install hurl
"""

[tasks.depends]
description = "Remove unused dependencies and upgrade old dependencies"
run = """
mise run core:deptry && \
mise run api:deptry && \
mise run web:knip && \
uv tree --outdated && \
npm outdated
"""

[tasks.codegen]
description = "Automatically generate interfaces"
run = """
./_scripts/sync_api_and_ts_types_and_enums.sh
"""


[tasks.sync]
description = "Sync current branch with latest dev from remote"
run = """
echo "Fetching latest changes from remote..." && \
git fetch origin && \
echo "Pulling latest dev branch..." && \
git checkout dev && \
git pull origin dev && \
echo "Switching back to original branch and merging dev..." && \
git checkout - && \
git merge dev && \
echo "Sync complete! Your branch is now up to date with dev."
"""

[tasks."ruff:check"]
description = "Run ruff linter on entire monorepo"
dir = "."
run = "uv run --dev ruff check core/src/ api/app/"

[tasks."ruff:format"]
description = "Run ruff formatter on entire monorepo"
dir = "."
run = "uv run --dev ruff format core/src/ api/app/"

# =============================================================================
# CORE TASKS (runs in ./core directory)
# =============================================================================

[tasks."core:check"]
description = "Run all quality checks for core"
dir = "core"
depends = [
  "core:types",
  "core:ruff_check",
  "core:ruff_format",
  "core:star_syntax",
  "core:vulture",
  "core:deptry",
  "core:enum",
]

[tasks."core:types"]
description = "Run mypy type checking for core"
dir = "core"
run = "uv run mypy --config-file ../pyproject.toml src/"

[tasks."core:deptry"]
description = "Run deptry for core"
dir = "core"
run = "uv run deptry ."

[tasks."core:vulture"]
description = "Run vulture for core"
dir = "."
run = "uv run vulture core/src/core --min-confidence 100"

[tasks."core:ruff_check"]
description = "Run ruff linter for core"
dir = "."
run = "uv run --dev ruff check core/src/"

[tasks."core:ruff_format"]
description = "Run ruff formatter for core"
dir = "."
run = "uv run --dev ruff format core/src/"

[tasks."core:star_syntax"]
description = "Check for star syntax violations in core"
dir = "core"
run = "uv run ../_scripts/star_syntax_check.py --directory src"

[tasks."core:pytest"]
description = "Run pytest for core"
dir = "core"
run = "pytest"

[tasks."core:enum"]
description = "Validate enums in core"
dir = "core"
run = "uv run _scripts/validate_enums.py"

[tasks."core:release"]
description = "Full release workflow for core (check, freeze, bump, commit, push)"
dir = "core"
depends = [
  "core:check",
  "core:freeze",
  "core:bump",
  "core:_add",
  "core:_commit",
  "core:_push",
]

[tasks."core:bump"]
description = "Bump core version (usage: mise run core:bump [patch|minor|major])"
dir = "core"
run = "uv version --bump ${1:-patch}"

[tasks."core:freeze"]
description = "Export frozen requirements.txt for core"
dir = "core"
run = """
uv export --frozen --no-emit-workspace --no-dev --no-editable \
  -o requirements.txt --no-hashes
"""

[tasks."core:_add"]
description = "Git add all changes in core"
dir = "core"
run = "git add ."

[tasks."core:_commit"]
description = "Git commit with 'Release' message for core"
dir = "core"
run = "git commit -m 'Release'"

[tasks."core:_push"]
description = "Git push changes for core"
dir = "core"
run = "git push"

[tasks."core:_tag"]
description = "Create and push git tag based on core version"
dir = "core"
run = """
VERSION=$(python -c "import tomllib; \
  print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
git tag "v$VERSION"
git push origin "v$VERSION"
"""

[tasks."core:db"]
description = "Generate alembic migration for core (usage: mise run core:db 'message')"
dir = "core"
run = """
alembic revision --autogenerate -m "$1" && \
python3 _scripts/clean_alembic.py --latest && \
python3 _scripts/update_releases.py "$1" && \
cd .. && uv run --dev ruff check core/src/ && \
cd .. && uv run --dev ruff format core/src/
"""

# =============================================================================
# API TASKS (runs in ./api directory)
# =============================================================================

[tasks."api:switch-core"]
description = "Switch core dependency source based on current git branch (staging/sandbox/main=CodeArtifact, others=editable)"
run = "python3 _scripts/switch_core_source.py"

[tasks."api:check-core-source"]
description = "Check which core dependency source is currently configured"
dir = "api"
run = "grep -A 1 '\\[tool.uv.sources\\]' pyproject.toml | grep core"

[tasks."api:check"]
description = "Run all quality checks for api"
dir = "api"
depends = [
  "api:types",
  "api:star_syntax",
  "api:ruff",
  "api:format",
  "api:pytest",
  "api:hurl",
  "api:deptry",
  "api:vulture",
]

[tasks."api:ruff"]
description = "Run ruff linter for api"
dir = "."
run = "uv run --dev ruff check api/app/"

[tasks."api:format"]
description = "Run ruff formatter for api"
dir = "."
run = "uv run --dev ruff format api/app/"

[tasks."api:vulture"]
description = "Run vulture for api"
dir = "."
run = "uv run vulture api/app --min-confidence 100"

[tasks."api:types"]
description = "Run mypy type checking for api"
dir = "api"
run = "uv run mypy --config-file ../pyproject.toml -p app"

[tasks."api:deptry"]
description = "Run deptry for api"
dir = "api"
run = "uv run deptry ."

[tasks."api:pytest"]
description = "Run pytest for api"
dir = "api"
run = "uv run pytest"

[tasks."api:star_syntax"]
description = "Check for star syntax violations in api"
dir = "api"
run = "uv run ../_scripts/star_syntax_check.py --directory app"

[tasks."api:hurl"]
description = "Run hurl smoke tests for api"
dir = "api"
run = """
hurl --location --variable baseURL=http://127.0.0.1:8000 \
  --variables-file .env --test ./_smoke_testing/hurl/get/*
"""

[tasks."api:freeze"]
description = "Export requirements.txt for AWS deployment"
dir = "api"
run = """
uv export --frozen --no-emit-workspace --no-dev --no-editable \
  -o requirements.txt --no-hashes --quiet
"""

[tasks."api:run"]
description = "Run the API server with hot reload"
dir = "api"
run = "uv run uvicorn app.main:app --reload --timeout-graceful-shutdown 0"

[tasks."api:get_env"]
description = "Generate .env file from AWS Systems Manager Parameter Store"
dir = "api"
run = "uv run _scripts/generate_env_from_parameter_store.py"

[tasks."api:uv"]
description = "Run uv wrapper script"
dir = "api"
run = "./_scripts/uv_wrapper.sh"

[tasks."api:test_deploy"]
description = "Test deployment package structure"
dir = "api"
run = "./_scripts/test_deployment_package.sh"

[tasks."api:insert_devices"]
description = "Insert devices data"
dir = "api"
run = "python3 -m _data_insert.project.1_devices"

[tasks."api:insert_tags"]
description = "Insert tags data for a project"
dir = "api"
run = "python3 -m _data_insert.project.2_tags"

[tasks."api:insert_pv_dc_combiners"]
description = "Insert PV DC combiners data"
dir = "api"
run = "python3 -m _data_insert.project.3_pv_dc_combiners"

[tasks."api:insert_kpi_types"]
description = "Insert KPI types data"
dir = "api"
run = "python3 -m _data_insert.operational.5_kpi_types"

[tasks."api:insert_kpi_instances"]
description = "Insert KPI instances data"
dir = "api"
run = "python3 -m _data_insert.operational.11_kpi_instances"

# =============================================================================
# WEB-APP TASKS (runs in ./web-app directory)
# =============================================================================

[tasks."web:dev"]
description = "Run web-app development server"
dir = "web-app"
run = "npm run dev"

[tasks."web:build"]
description = "Build web-app for production"
dir = "web-app"
run = "npm run build"

[tasks."web:preview"]
description = "Preview production build of web-app"
dir = "web-app"
run = "npm run preview"

[tasks."web:check"]
description = "Run TypeScript check, ESLint, and format web-app"
dir = "web-app"
run = "npm run check && npm run lint"

[tasks."web:lint"]
description = "Run ESLint for web-app"
dir = "web-app"
run = "npm run lint"

[tasks."web:lint-summary"]
description = "Run ESLint summary for web-app"
dir = "web-app"
run = """npx eslint . --format json | node -e "const data=require('fs').readFileSync(0,'utf-8'); const results=JSON.parse(data); const counts={}; results.forEach(r=>r.messages.forEach(m=>{counts[m.ruleId]=(counts[m.ruleId]||0)+1})); console.log(Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([rule,count])=>''+count.toString().padStart(4)+' - '+rule).join('\\n'));" """

[tasks."web:lint-focus"]
description = "Run ESLint summary for web-app, make sure to specify the rule ID"
dir = "web-app"
usage = '''
  arg "<rule>" help="ESLint rule ID to filter by"
'''
run = [
  '''npx eslint . --format json | jq -r --arg rule ${usage_rule} '.[] | .filePath as $file | .messages[] | select(.ruleId == $rule) | "\($file):\(.line):\(.column) - \(.message)"' ''',
]

# =============================================================================
# SQL-ADMIN TASKS (runs in ./sql-admin directory)
# =============================================================================

[tasks."sql-admin:install"]
description = "Install dependencies for sql-admin"
dir = "sql-admin"
run = "uv sync"

[tasks."sql-admin:run"]
description = "Run the sql-admin server"
dir = "sql-admin"
usage = '''
  arg "[schema]" help="Database schema to use (defaults to 'project_default')"
'''
run = """
export SQL_ADMIN_SCHEMA=${usage_schema:-project_default}
uv run uvicorn main:app --reload --host 0.0.0.0 --port 8001
"""
