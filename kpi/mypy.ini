[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True
plugins = pydantic.mypy
exclude = ^(_sandbox/|cdk/)

# Enable override checking to catch parameter name mismatches and protocol checking
enable_error_code = override,misc,type-arg

# Disable var-annotated to allow class attributes without type annotations
disable_error_code = var-annotated 