# Gzip compression configuration
# This file loads after gzip off; in nginx.conf (via include on line 41)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_comp_level 5;

gzip_types
    text/plain
    text/css
    application/json
    application/problem+json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;
gzip_disable "msie6";
