repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.0
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: star-syntax-check
        name: Star Syntax Semgrep Check
        description: Ensures functions use keyword-only args when required.
        entry: uvx semgrep@1.160 --error --config ../_scripts/rules/star-syntax.yaml
        language: system
        types: [python]
        pass_filenames: true

