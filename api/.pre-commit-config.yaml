repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.12
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: star-syntax-check
        name: Star Syntax Check
        description: Ensures functions have keyword-only arguments unless decorated with @router
        entry: ../_scripts/star_syntax_check.py
        language: script
        types: [python]
        pass_filenames: true

