[project]
name = "api"
version = "0.9.0"
description = "Main API for the Proximal Platform"
readme = "README.md"
requires-python = ">=3.12.8,<3.13.0"
dependencies = [
    "aiofiles >=24.1.0,<25",
    "aiohappyeyeballs >=2.4.3,<3",
    "aiohttp >=3.12,<4",
    "async-timeout >=4.0.3,<5",
    "asyncer >=0.0.8,<0.1",
    "asyncpg >=0.30.0,<0.31",
    "attrs >=25.2.0,<26",
    "bidict >=0.23.1,<0.24",
    "boto3 >=1.38,<2",
    "chevron >=0.14.0,<0.15",
    "clerk-backend-api >=3.0.3,<3.1",
    "core",
    "cryptography >=44,<45",
    "deprecated >=1.2.14,<2",
    "dnspython >=2.7.0,<3",
    "email-validator >=2.2.0,<3",
    "et-xmlfile >=1.1.0,<2",
    "fastapi >=0.116,<0.117",
    "fastapi-cli >=0.0.7,<0.1",
    "fastapi-mcp>=0.3.6",
    "fastapi-socketio >=0.0.10,<0.1",
    "filetype >=1.2.0,<2",
    "frozenlist >=1.5.0,<2",
    "geoalchemy2 >=0.18,<0.19",
    "google-api-python-client >=2.166.0,<3",
    "google-auth-httplib2 >=0.2.0,<0.3",
    "google-auth-oauthlib >=1.2.1,<2",
    "googleapis-common-protos >=1.69.2,<2",
    "greenlet",
    "grpcio >=1.67.0,<2",
    "httptools >=0.6.4,<0.7",
    "httpx >=0.28,<0.29",
    "importlib-metadata >=8.4.0,<9",
    "jinja2 >=3.1.5,<4",
    "kaleido==0.2.1",
    "lazify >=0.4.0,<0.5",
    "literalai >=0.1,<0.2",
    "markdown-it-py >=3.0.0,<4",
    "mdurl >=0.1.2,<0.2",
    "multidict >=6.1.0,<7",
    "natsort >=8.4.0,<9",
    "nest-asyncio >=1.6.0,<2",
    "openai>=1.86.0",
    "openpyxl >=3.1.5,<4",
    "orjson >=3.10.9,<4",
    "pandas >=2.2.3,<3",
    "pillow >=11.1.0,<12",
    "plotly >=6,<7",
    "polars <1.33.0", # Added strict version constraint to avoid breaking change introduced here https://github.com/pola-rs/polars/pull/24027
    "psycopg2-binary==2.9.10",
    "pvlib>=0.13,<0.14",
    "pyarrow>=20.0.0",
    "pyjwt >=2.9.0,<3",
    "python-dotenv >=1.0.1,<2",
    "python-graphql-client >=0.4.3,<0.5",
    "python-multipart >=0.0.19,<0.1",
    "requests>=2.32.4",
    "s3fs>=0.4.2,<0.5",
    "sentry-sdk >=2.17.0,<3",
    "shapely >=2.1.1,<3",
    "sqlalchemy >=2.0.43,<3",
    "timezonefinder>=6.2.0",
    "syncer >=2.0.3,<3",
    "tenacity >=9.0.0,<10",
    "uptrace >=1.31,<2",
    "urllib3>=2.5.0",
    "uvicorn >=0.35,<0.36",
    "xlsxwriter >=3.2.5,<4",
    "dataclasses-json>=0.6.7",
    "starlette>=0.47.2", # delete this once fastapi includes >= 0.47.2
]

[dependency-groups]
dev = [
    "boto3-stubs>=1.37.36",
    "botocore-stubs>=1.37.36",
    "ipykernel>=6.29.5",
    "mypy>=1.15.0",
    "pandas-stubs>=2.2.2.240807",

    "pre-commit>=4.2.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=1.1.0",
    "pytest-mock>=3.14.0",
    "ruff>=0.14.0",
    "tomli>=2.0.2",
    "types-psycopg2>=2.9.21.20250318",
    "types-requests>=2.31.0.6",
    "typing-extensions>=4.12.2",
]
[tool.uv.sources]
core = { path = "../core", editable = true }

[[tool.uv.index]]
name = "proximal-package-index"
url = "https://proximal-code-artifact-domain-016997484973.d.codeartifact.us-east-2.amazonaws.com/pypi/proximal-hub/simple/"
explicit = true

[tool.uv]



[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

# Note: ruff and mypy configuration now lives in the root pyproject.toml
# to unify linting logic across the monorepo


# --- pyright ---
[tool.pyright]
venv = ".venv"
venvPath = "."

[tool.setuptools]
packages = ["app", "_scripts"]
