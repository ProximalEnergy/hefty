[project]
name = "core"
version = "0.2.43"
description = "Shared library for Proximal services"
readme = "README.md"
authors = [
    { name = "Kurt Rhee", email = "33131958+kurt-rhee@users.noreply.github.com" },
]
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.30.0",
    "dotenv>=0.9.9",
    "fastapi>=0.115.14",
    "geoalchemy2>=0.17.1",
    "greenlet>=3.2.4",
    "pandas>=2.3.0",
    "polars>=1.31.0",
    "psycopg2-binary>=2.9.10",
    "sqlalchemy>=2.0.41",
    "sqlalchemy-utils>=0.41.2",
]

[project.scripts]
core = "core:main"

[build-system]
requires = ["uv_build>=0.7.2,<0.8"]
build-backend = "uv_build"

[[tool.uv.index]]
name = "proximal-package-index"
url = "https://proximal-code-artifact-domain-016997484973.d.codeartifact.us-east-2.amazonaws.com/pypi/proximal-hub/"
publish-url = "https://proximal-code-artifact-domain-016997484973.d.codeartifact.us-east-2.amazonaws.com/pypi/proximal-hub/"

[dependency-groups]
dev = [
    "alembic>=1.16.1",
    "basedpyright>=1.31.4",
    "mypy>=1.16.1",
    "pandas-stubs>=2.3.0.250703",
    "poethepoet>=0.35.0",
    "pytest>=8.4.1",
    "ruff>=0.14.0",
]

# --- ruff configuration ---
[tool.ruff]
line-length = 88 # or your preferred line length
fix = true

[tool.ruff.lint]
select = [
    "ANN002", # checks that *args are typed
    "ASYNC",  # async python checks
    "COM",    # Ending commas
    "EXE",    # Executables
    "FA",     # Future Annotations
    "F401",   # Remove unused imports
    "FURB",   # Code modernization
    "I",      # isort:  Sort all imports
    "INT",    # Gettext formatting
    "ISC",    # Implicit string concat
    "ICN",    # Import alias
    "PD002",  # Pandas inplace
    "PIE",    # Code simplification
    # "S101",   # Look for assert
    "S102", # Look for exec
    "S103", # Look for os.chmod
    "S104", # harcoded bind all interfaces
    "S105", # hardcoded password string
    "S106", # hardcoded password func arg
    "S107", # hardcoded password defaults
    "S108", # hardcoded temp files
    "S110", # try-except-pass
    "T",    # debugger checks
    "T20",  # Lint print and pprint Statements
    "UP",   # Pyupgrade
    "S608", # hardcoded-sql-expression
]
fixable = ["ALL"]
unfixable = []
ignore = [
    "COM812",
    "COM819",
]

[tool.uv]

# === POE ===
# --- Complex Tasks ---
# Release:  Composite task with positional argument
[tool.poe.tasks.release]
sequence = ["check", "freeze", "bump", "_add", "_commit", "_push"]

[[tool.poe.tasks.release.args]]
name = "level"
help = "version level to bump (patch, minor, major, stabl)"
positional = true
default = "patch"

# Bump:  Positional argument require this format
[tool.poe.tasks.bump]
shell = "uv version --bump ${level:-patch}"
help = "Bump version level (patch, minor, major)"

[[tool.poe.tasks.bump.args]]
name = "level"
help = "version level to bump (patch, minor, major)"
positional = true
default = "patch"

# Alembic
[tool.poe.tasks.db]
shell = "alembic revision --autogenerate -m \"$message\" && python3 _scripts/clean_alembic.py --latest && python3 _scripts/update_releases.py \"$message\" && ruff check && ruff format"
help = "Generate alembic migration with message"
args = [{ name = "message", help = "Migration message", positional = true }]

# --- Simple Tasks ---
[tool.poe.tasks]

# Check:  Composite Task and Subtasks
check = ["types", "ruff_check", "ruff_format", "star_syntax", "enum"]
types = "uv run mypy --config-file pyproject.toml src/"
ruff_check = "ruff check"
ruff_format = "ruff format"
star_syntax = "uv run _pr_checks/star_syntax_check.py"
pytest = "pytest"

# Release Subtasks
freeze = "uv export --frozen --no-emit-workspace --no-dev --no-editable -o requirements.txt --no-hashes"
_add = "git add ."
_commit = "git commit -m 'Release'"
_push = "git push"
_tag = { "shell" = """
    VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
    git tag "v$VERSION"
    git push origin "v$VERSION"
    """ }

# Validation
enum = "uv run _scripts/validate_enums.py"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
exclude = [
    "^core/.*", # Exclude installed package
]
mypy_path = "src"

[tool.pyright]
venvPath = "."
venv = ".venv"
