name: Publish to AWS CodeArtifact

on:
  push:
    branches:
      - main
    paths:
      - 'src/core/**'
      - 'pyproject.toml'
      - '.github/workflows/*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Authenticate with AWS CodeArtifact
        run: |
          AWS_CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token \
            --domain proximal-code-artifact-domain \
            --region us-east-2 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$AWS_CODEARTIFACT_TOKEN"
          echo "AWS_CODEARTIFACT_TOKEN=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Set UV environment variables
        run: |
          echo "UV_INDEX_PROXIMAL_PRIVATE_PACKAGE_INDEX_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PROXIMAL_PRIVATE_PACKAGE_INDEX_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV
          echo "UV_PUBLISH_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_PUBLISH_PASSWORD=$AWS_CODEARTIFACT_TOKEN" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Wheel
        run: uv build

      - name: Publish to AWS CodeArtifact
        run: uv publish --index proximal-package-index

  create_release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create v${{ steps.get_version.outputs.version }} --generate-notes
